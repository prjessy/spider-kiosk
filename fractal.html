<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>무한 프랙탈 줌</title>
<script src="qrcode.min.js"></script>
<script>
  if (typeof qrcode === 'undefined') {
    document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"><\/script>');
  }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000; color: #eee; overflow: hidden;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    user-select: none; -webkit-user-select: none; touch-action: none;
  }
  @supports (height: 100dvh) { html, body { height: 100dvh; } }

  canvas#c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; cursor: crosshair; touch-action: none; }

  #toolbar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 4px; flex-wrap: nowrap; overflow-x: auto;
    padding: 6px 10px;
    background: rgba(18, 20, 28, 0.82); backdrop-filter: blur(6px);
    color: #ddd; font-size: 12px; z-index: 100; transition: transform 0.25s ease;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  #toolbar.hidden { transform: translateY(-100%); }
  .group { display: flex; align-items: center; gap: 4px; padding: 0 8px; border-right: 1px solid rgba(255,255,255,0.15); }
  .group:last-child { border-right: none; margin-left: auto; }

  button {
    display: inline-flex; align-items: center; gap: 5px;
    background: #2c2f3a; border: 1px solid #4a4e5c; color: #eee;
    border-radius: 5px; padding: 6px 11px; font-size: 12px; font-family: inherit; cursor: pointer; white-space: nowrap;
  }
  button .ic { font-size: 13px; line-height: 1; }
  button:hover { background: #3a3e4c; }
  button:active { background: #474c5c; }
  button.on { background: #ef9a5b; border-color: #ef9a5b; color: #1a1a1a; font-weight: bold; }

  label { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  input[type="range"] { width: 110px; height: 26px; accent-color: #f0b27a; touch-action: none; }
  .val { width: 24px; text-align: right; color: #f0b27a; font-variant-numeric: tabular-nums; }

  #showTab { position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    background: rgba(18,20,28,0.8); color: #aaa; font-size: 11px; padding: 3px 18px;
    border-radius: 0 0 8px 8px; cursor: pointer; z-index: 99; display: none; }
  #toolbar.hidden ~ #showTab { display: block; }

  #hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    font-size: 13px; letter-spacing: 0.04em; color: rgba(255,255,255,0.62);
    background: rgba(0,0,0,0.35); padding: 6px 16px; border-radius: 20px;
    pointer-events: none; z-index: 50; text-align: center; transition: opacity .4s; max-width: 92vw;
  }
  #depth {
    position: fixed; top: 50px; right: 12px; z-index: 50;
    font-size: 11px; color: rgba(240,178,122,0.85); background: rgba(0,0,0,0.35);
    padding: 3px 9px; border-radius: 12px; pointer-events: none; font-variant-numeric: tabular-nums;
  }

  /* 오버레이(전송/진행) */
  .overlay { position: fixed; inset: 0; z-index: 200; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: #12131b; padding: 16px; }
  .overlay.active { display: flex; }
  .ctrl { background: #2e2e3a; border: 1px solid #4a4a5a; color: #eee; font-size: 17px; font-family: inherit;
    padding: 13px 28px; border-radius: 12px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .ctrl:active { background: #44445a; }
  .ctrl.primary { background: #ef9a5b; border-color: #ef9a5b; color: #1a1a1a; font-weight: bold; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 94vw; }
  #qrBox { background: #fff; padding: 22px; border-radius: 18px; display: none; }
  #qrBox img { display: block; width: 300px; height: 300px; image-rendering: pixelated; }
  #spinner { width: 56px; height: 56px; border: 5px solid #333; border-top-color: #ef9a5b; border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #sendMsg { font-size: 18px; text-align: center; line-height: 1.6; max-width: 90vw; }
  #sendMsg small { color: #889; font-size: 13px; }
  #urlText { font-size: 12px; color: #667; word-break: break-all; max-width: 70vw; text-align: center; }

  #progWrap { width: min(80vw, 460px); }
  #progBarOuter { width: 100%; height: 14px; background: #2a2c38; border-radius: 8px; overflow: hidden; }
  #progBar { width: 0%; height: 100%; background: linear-gradient(90deg,#ef9a5b,#f0d27a); transition: width .15s; }
  #progMsg { margin-bottom: 14px; font-size: 17px; }

  @media (max-width: 760px) {
    #toolbar { gap: 3px; padding: 6px 6px; }
    #toolbar button .lbl { display: none; }
    #toolbar button { padding: 8px 9px; }
    .group { padding: 0 5px; gap: 3px; }
    .group:last-child { margin-left: 0; }
    input[type="range"] { width: 90px; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="toolbar">
  <div class="group">
    <button id="btnMorph" title="색상이 서서히 변하는 모핑 효과"><span class="ic">🎨</span><span class="lbl">색상 모핑</span></button>
    <button id="btnPalette" title="색상 팔레트 변경"><span class="ic">🌈</span><span class="lbl">팔레트</span></button>
  </div>
  <div class="group">
    <label title="확대 속도">속도 <input type="range" id="zoomSpd" min="1" max="10" step="1" value="5"></label>
    <label title="색 밴드 농도">색 농도 <input type="range" id="bandS" min="20" max="120" step="5" value="55"></label>
  </div>
  <div class="group">
    <button id="btnOut" title="길게 눌러 축소"><span class="ic">🔍−</span><span class="lbl">축소</span></button>
    <button id="btnReset" title="처음 화면으로"><span class="ic">↺</span><span class="lbl">리셋</span></button>
  </div>
  <div class="group">
    <button id="btnSave" title="현재 화면 저장(PNG)"><span class="ic">💾</span><span class="lbl">저장</span></button>
    <button id="btn4k" title="4K 고해상도로 저장"><span class="ic">🖼</span><span class="lbl">4K 저장</span></button>
    <button id="btnSend" title="QR로 핸드폰에 전송"><span class="ic">📱</span><span class="lbl">보내기</span></button>
  </div>
  <div class="group">
    <button id="btnFull" title="전체화면"><span class="ic">⛶</span><span class="lbl">전체화면</span></button>
    <button id="btnHide" title="툴바 숨기기"><span class="ic">▲</span></button>
    <button id="btnClose" title="닫기"><span class="ic">✕</span><span class="lbl">닫기</span></button>
  </div>
</div>
<div id="showTab">▼ 메뉴</div>

<div id="depth">×1</div>
<div id="hint">이미지를 <b>길게 누르고 있으면</b> 그 지점으로 무한히 확대돼요 · 손을 떼면 선명하게 렌더링</div>

<!-- 전송/QR 오버레이 -->
<div class="overlay" id="ovSend">
  <div id="spinner"></div>
  <div id="qrBox"><img id="qrImg" alt="QR"></div>
  <div id="sendMsg">업로드 중...</div>
  <div class="row" id="shareRow" style="display:none">
    <a class="ctrl primary" id="btnOpenPhoto" target="_blank" rel="noopener">📷 사진 열기</a>
    <button class="ctrl" id="btnShare" style="display:none">↗ 공유하기</button>
    <button class="ctrl" id="btnCopyLink">📋 링크 복사</button>
  </div>
  <div id="urlText"></div>
  <div class="row">
    <button class="ctrl" id="btnRetry" style="display:none">🔄 다시 시도</button>
    <button class="ctrl primary" id="btnSendClose">✓ 돌아가기</button>
  </div>
</div>

<!-- 4K 렌더 진행 오버레이 -->
<div class="overlay" id="ovProg">
  <div id="progMsg">4K 이미지 생성 중...</div>
  <div id="progWrap"><div id="progBarOuter"><div id="progBar"></div></div></div>
  <button class="ctrl" id="btnProgCancel">취소</button>
</div>

<script>
(() => {
  'use strict';
  const $ = id => document.getElementById(id);

  // ── 만델브로트 렌더 코어(검증 완료) ────────────────────────
  function mandelSmooth(cx, cy, scale, W, H, maxIter, out, y0, y1) {
    if (y0 === undefined) y0 = 0; if (y1 === undefined) y1 = H;
    const halfW = W / 2, halfH = H / 2, ER2 = 65536, inv = 1 / Math.LN2;
    let p = y0 * W;
    for (let py = y0; py < y1; py++) {
      const ci = cy - (py - halfH) * scale;
      for (let px = 0; px < W; px++) {
        const cr = cx + (px - halfW) * scale;
        let zr = 0, zi = 0, zr2 = 0, zi2 = 0, it = 0;
        while (zr2 + zi2 <= ER2 && it < maxIter) {
          zi = 2 * zr * zi + ci; zr = zr2 - zi2 + cr; zr2 = zr * zr; zi2 = zi * zi; it++;
        }
        if (it >= maxIter) out[p++] = -1;
        else { const m = Math.sqrt(zr2 + zi2); out[p++] = it + 1 - Math.log(Math.log(m)) * inv; }
      }
    }
  }
  function buildLUT(coef, N) {
    const a = coef[0], b = coef[1], c = coef[2], d = coef[3], lut = new Uint8Array(N * 3), TAU = 6.28318530718;
    for (let i = 0; i < N; i++) {
      const t = i / N;
      for (let k = 0; k < 3; k++) {
        let v = a[k] + b[k] * Math.cos(TAU * (c[k] * t + d[k]));
        v = v < 0 ? 0 : v > 1 ? 1 : v;
        lut[i * 3 + k] = (v * 255 + 0.5) | 0;
      }
    }
    return lut;
  }
  const PALETTES = [
    [[0.5, 0.34, 0.30], [0.5, 0.33, -0.46], [1.0, 1.0, 1.0], [0.0, 0.02, 0.05]], // 블루-오렌지
    [[0.5, 0.25, 0.05], [0.5, 0.35, 0.2], [1.0, 1.0, 1.0], [0.0, 0.08, 0.18]],   // 파이어
    [[0.5, 0.5, 0.5], [0.5, 0.5, 0.5], [1.0, 1.0, 1.0], [0.5, 0.55, 0.65]],      // 일렉트릭
    [[0.45, 0.45, 0.4], [0.4, 0.4, 0.45], [1.0, 1.0, 0.9], [0.1, 0.25, 0.55]],   // 골드-틸
  ];
  function colorize(out, data, lut, offset, band, from, to) {
    const N = lut.length / 3;
    for (let i = from, p = from * 4; i < to; i++, p += 4) {
      const nu = out[i];
      if (nu < 0) { data[p] = 4; data[p + 1] = 4; data[p + 2] = 12; data[p + 3] = 255; continue; }
      let t = Math.sqrt(nu) * band + offset; t = t - Math.floor(t);
      let idx = (t * N) | 0; if (idx >= N) idx = N - 1; idx *= 3;
      data[p] = lut[idx]; data[p + 1] = lut[idx + 1]; data[p + 2] = lut[idx + 2]; data[p + 3] = 255;
    }
  }

  // ── 상태 ──────────────────────────────────────────────────
  const canvas = $('c'), ctx = canvas.getContext('2d');
  const toolbar = $('toolbar');
  let W = 2, H = 2;
  let cx = -0.6, cy = 0, scale = 0.01, scale0 = 0.01, inited = false;
  const MIN_SCALE = 5e-16;
  const LUT_N = 2048;
  let palIdx = 0, lut = buildLUT(PALETTES[0], LUT_N);
  let offset = 0, band = 0.55, morph = false;
  const MORPH_SPEED = 0.0026;
  let zooming = false, zoomRate = 0.983, P = { x: 0, y: 0 }, ax = 0, ay = 0;

  let iterBuf = null, fullImg = null, idleReady = false, fullState = null;

  function complexAt(px, py) { return { x: cx + (px - W / 2) * scale, y: cy - (py - H / 2) * scale }; }
  function maxIterFor(s) { const z = Math.max(0, Math.log2(scale0 / s)); return Math.min(2400, Math.round(150 + z * 32)); }
  function zoomInRate() { const v = +$('zoomSpd').value; return 1 - (0.006 + v * 0.0022); }   // 빠를수록 1에서 멀어짐
  function updateDepth() {
    const z = scale0 / scale;
    let s; if (z < 1000) s = '×' + z.toFixed(z < 10 ? 1 : 0);
    else { const e = Math.floor(Math.log10(z)); s = '×10^' + e; }
    $('depth').textContent = s;
  }

  // ── 라이브(저해상도) 렌더: 줌 중 ──────────────────────────
  let loW = 460, loBuf = new Float32Array(1), loCurW = 0, loCurH = 0, loImg = null;
  const lo = document.createElement('canvas'), loCtx = lo.getContext('2d');
  function renderLive() {
    const lw = loW, lh = Math.max(1, Math.round(loW * H / W));
    if (lw !== loCurW || lh !== loCurH) {
      lo.width = lw; lo.height = lh; loImg = loCtx.createImageData(lw, lh); loCurW = lw; loCurH = lh;
      if (loBuf.length < lw * lh) loBuf = new Float32Array(lw * lh);
    }
    const sc = scale * W / lw, mi = Math.min(maxIterFor(scale), 360), t0 = performance.now();
    mandelSmooth(cx, cy, sc, lw, lh, mi, loBuf, 0, lh);
    colorize(loBuf, loImg.data, lut, offset, band, 0, lw * lh);
    loCtx.putImageData(loImg, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(lo, 0, 0, lw, lh, 0, 0, W, H);
    const dt = performance.now() - t0;
    if (dt > 46 && loW > 260) loW -= 40; else if (dt < 22 && loW < 640) loW += 40;
    updateDepth();
  }

  // ── 풀(고해상도) 렌더: 멈췄을 때 행 단위 점진 렌더 ─────────
  function requestFull() { fullState = { y: 0, iter: new Float32Array(W * H), img: ctx.createImageData(W, H), mi: maxIterFor(scale) }; idleReady = false; }
  function stepFull(budget) {
    const s = fullState, t0 = performance.now();
    while (s.y < H) {
      const y1 = Math.min(H, s.y + 6);
      mandelSmooth(cx, cy, scale, W, H, s.mi, s.iter, s.y, y1);
      colorize(s.iter, s.img.data, lut, offset, band, s.y * W, y1 * W);
      s.y = y1;
      if (performance.now() - t0 > budget) break;
    }
    ctx.putImageData(s.img, 0, 0);
    if (s.y >= H) { iterBuf = s.iter; fullImg = s.img; idleReady = true; fullState = null; }
  }
  function recolorIdle() { colorize(iterBuf, fullImg.data, lut, offset, band, 0, W * H); ctx.putImageData(fullImg, 0, 0); }

  function zoomStep() {
    scale *= zoomRate;
    if (scale < MIN_SCALE) scale = MIN_SCALE;
    else if (scale > scale0) scale = scale0;
    cx = P.x - (ax - W / 2) * scale;
    cy = P.y + (ay - H / 2) * scale;
  }

  // ── 메인 루프 ─────────────────────────────────────────────
  function tick() {
    if (zooming) { zoomStep(); if (morph) offset += MORPH_SPEED; renderLive(); }
    else if (fullState) { stepFull(14); if (fullState === null) updateDepth(); }
    else if (morph && idleReady) { offset += MORPH_SPEED; recolorIdle(); }
    requestAnimationFrame(tick);
  }

  // ── 입력 ──────────────────────────────────────────────────
  function bpos(e) {
    const r = canvas.getBoundingClientRect(), t = e.touches ? e.touches[0] : e;
    return [(t.clientX - r.left) * W / r.width, (t.clientY - r.top) * H / r.height];
  }
  function startZoom(px, py, rate) { P = complexAt(px, py); ax = px; ay = py; zoomRate = rate; zooming = true; hideHint(); }
  function endZoom() { if (!zooming) return; zooming = false; requestFull(); }

  canvas.addEventListener('mousedown', e => { startZoom(...bpos(e), zoomInRate()); });
  window.addEventListener('mousemove', e => { if (zooming) { const b = bpos(e); P = complexAt(b[0], b[1]); ax = b[0]; ay = b[1]; } });
  window.addEventListener('mouseup', endZoom);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); startZoom(...bpos(e), zoomInRate()); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (zooming) { const b = bpos(e); P = complexAt(b[0], b[1]); ax = b[0]; ay = b[1]; } }, { passive: false });
  canvas.addEventListener('touchend', e => { e.preventDefault(); endZoom(); }, { passive: false });
  canvas.addEventListener('touchcancel', endZoom);
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const b = bpos(e), Pp = complexAt(b[0], b[1]), f = e.deltaY < 0 ? 0.78 : 1.28;
    scale *= f; if (scale < MIN_SCALE) scale = MIN_SCALE; else if (scale > scale0) scale = scale0;
    cx = Pp.x - (b[0] - W / 2) * scale; cy = Pp.y + (b[1] - H / 2) * scale;
    requestFull(); updateDepth();
  }, { passive: false });

  // 길게 눌러 축소 버튼
  function holdButton(btn, onDown) {
    const d = e => { e.preventDefault(); onDown(); };
    btn.addEventListener('mousedown', d); btn.addEventListener('touchstart', d, { passive: false });
    btn.addEventListener('mouseup', endZoom); btn.addEventListener('mouseleave', endZoom);
    btn.addEventListener('touchend', e => { e.preventDefault(); endZoom(); }, { passive: false });
  }
  holdButton($('btnOut'), () => { zooming = false; startZoom(W / 2, H / 2, 1 / zoomInRate()); });

  let hintTimer = setTimeout(() => $('hint').style.opacity = '0', 6000);
  function hideHint() { $('hint').style.opacity = '0'; clearTimeout(hintTimer); }

  // ── 화면 크기 ─────────────────────────────────────────────
  function resize() {
    const cssW = window.innerWidth, cssH = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
    const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    let bw = Math.max(2, Math.round(cssW * dpr)), bh = Math.max(2, Math.round(cssH * dpr));
    const MAXP = 2600 * 1600, f = Math.sqrt(MAXP / (bw * bh)); if (f < 1) { bw = Math.round(bw * f); bh = Math.round(bh * f); }
    W = bw; H = bh; canvas.width = W; canvas.height = H;
    canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
    if (!inited) { cx = -0.6; cy = 0; scale = 3.4 / W; scale0 = scale; inited = true; }
    requestFull(); updateDepth();
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 250));
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

  // ── 팔레트 / 모핑 / 색 농도 ────────────────────────────────
  function recolorNow() { if (idleReady && !zooming && !fullState) recolorIdle(); }
  $('btnPalette').addEventListener('click', () => {
    palIdx = (palIdx + 1) % PALETTES.length;
    lut = buildLUT(PALETTES[palIdx], LUT_N);
    recolorNow();
  });
  $('btnMorph').addEventListener('click', () => { morph = !morph; $('btnMorph').classList.toggle('on', morph); });
  $('bandS').addEventListener('input', e => { band = +e.target.value / 100; recolorNow(); });
  $('zoomSpd').addEventListener('input', () => { if (zooming) zoomRate = zoomInRate(); });

  $('btnReset').addEventListener('click', () => { cx = -0.6; cy = 0; scale = scale0; requestFull(); updateDepth(); });

  // ── 저장 ──────────────────────────────────────────────────
  function timeStamp() {
    const t = new Date(), pad = n => String(n).padStart(2, '0');
    return `${t.getFullYear()}${pad(t.getMonth() + 1)}${pad(t.getDate())}_${pad(t.getHours())}${pad(t.getMinutes())}${pad(t.getSeconds())}`;
  }
  function downloadURL(url, name) { const a = document.createElement('a'); a.download = name; a.href = url; a.click(); }
  function ensureFull() { if (!idleReady) { if (!fullState) requestFull(); while (fullState) stepFull(2000); } }
  $('btnSave').addEventListener('click', () => { ensureFull(); downloadURL(canvas.toDataURL('image/png'), `fractal_${timeStamp()}.png`); });

  // 4K 저장 (진행바 + 취소)
  let cancel4k = false;
  $('btnProgCancel').addEventListener('click', () => { cancel4k = true; });
  $('btn4k').addEventListener('click', () => {
    const TW = 3840, TH = Math.max(1, Math.round(3840 * H / W));
    const iter = new Float32Array(TW * TH);
    const tcan = document.createElement('canvas'); tcan.width = TW; tcan.height = TH;
    const tctx = tcan.getContext('2d'), timg = tctx.createImageData(TW, TH);
    const mi = Math.min(3000, maxIterFor(scale) + 250), scT = scale * W / TW;
    cancel4k = false; $('ovProg').classList.add('active'); $('progBar').style.width = '0%';
    let y = 0;
    (function chunk() {
      if (cancel4k) { $('ovProg').classList.remove('active'); return; }
      const t0 = performance.now();
      while (y < TH) {
        const y1 = Math.min(TH, y + 4);
        mandelSmooth(cx, cy, scT, TW, TH, mi, iter, y, y1);
        colorize(iter, timg.data, lut, offset, band, y * TW, y1 * TW);
        y = y1;
        if (performance.now() - t0 > 40) break;
      }
      $('progBar').style.width = (100 * y / TH).toFixed(1) + '%';
      if (y < TH) { setTimeout(chunk, 0); }
      else {
        tctx.putImageData(timg, 0, 0);
        tcan.toBlob(b => { downloadURL(URL.createObjectURL(b), `fractal4k_${timeStamp()}.png`); $('ovProg').classList.remove('active'); }, 'image/png');
      }
    })();
  });

  // ── 보내기(업로드 → QR) ───────────────────────────────────
  const UPLOAD_TIMEOUT_MS = 20000;
  let lastShareUrl = null;
  function xhrUpload(url, fd) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', url); xhr.timeout = UPLOAD_TIMEOUT_MS;
      xhr.onload = () => (xhr.status >= 200 && xhr.status < 300) ? resolve(xhr.responseText) : reject(new Error('HTTP ' + xhr.status));
      xhr.onerror = () => reject(new Error('네트워크 오류')); xhr.ontimeout = () => reject(new Error('시간 초과'));
      xhr.send(fd);
    });
  }
  async function uploadLitterbox(blob, fn) {
    const fd = new FormData(); fd.append('reqtype', 'fileupload'); fd.append('time', '72h'); fd.append('fileToUpload', blob, fn);
    const url = (await xhrUpload('https://litterbox.catbox.moe/resources/internals/api.php', fd)).trim();
    if (!/^https?:\/\/\S+$/.test(url)) throw new Error(url || '업로드 실패');
    return { url, expiry: '72시간' };
  }
  async function uploadTmpfiles(blob, fn) {
    const fd = new FormData(); fd.append('file', blob, fn);
    const json = JSON.parse(await xhrUpload('https://tmpfiles.org/api/v1/upload', fd));
    if (json.status !== 'success') throw new Error(json.message || '업로드 실패');
    return { url: json.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/'), expiry: '60분' };
  }
  async function uploadForShare(blob, fn) {
    const errs = [];
    try { return await uploadLitterbox(blob, fn); } catch (e) { errs.push('litterbox: ' + e.message); }
    try { return await uploadTmpfiles(blob, fn); } catch (e) { errs.push('tmpfiles: ' + e.message); }
    throw new Error(errs.join(' / ') || '업로드 실패');
  }
  async function send() {
    ensureFull();
    $('ovSend').classList.add('active'); $('spinner').style.display = 'block'; $('qrBox').style.display = 'none';
    $('btnRetry').style.display = 'none'; $('shareRow').style.display = 'none';
    $('sendMsg').innerHTML = '업로드 중...'; $('urlText').textContent = '';
    try {
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
      const { url, expiry } = await uploadForShare(blob, `fractal_${timeStamp()}.jpg`);
      const qr = qrcode(0, 'M'); qr.addData(url); qr.make();
      $('qrImg').src = qr.createDataURL(8, 8);
      $('spinner').style.display = 'none'; $('qrBox').style.display = 'block';
      $('sendMsg').innerHTML = '📱 QR을 스캔하거나 아래 버튼으로 열기/공유<br><small>링크는 ' + expiry + ' 동안 유효합니다</small>';
      lastShareUrl = url; $('btnOpenPhoto').href = url; $('shareRow').style.display = 'flex';
      $('btnShare').style.display = (navigator.share ? '' : 'none'); $('urlText').textContent = url;
    } catch (err) {
      $('spinner').style.display = 'none'; $('btnRetry').style.display = '';
      $('sendMsg').innerHTML = '⚠ 업로드에 실패했습니다<br><small>' + err.message + '<br>인터넷 연결을 확인하고 다시 시도하거나 [저장]을 이용하세요</small>';
    }
  }
  $('btnSend').addEventListener('click', send);
  $('btnRetry').addEventListener('click', send);
  $('btnSendClose').addEventListener('click', () => $('ovSend').classList.remove('active'));
  $('btnCopyLink').addEventListener('click', async () => {
    if (!lastShareUrl) return;
    let ok = false;
    try { await navigator.clipboard.writeText(lastShareUrl); ok = true; }
    catch (e) {
      try { const ta = document.createElement('textarea'); ta.value = lastShareUrl; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select(); ok = document.execCommand('copy'); document.body.removeChild(ta); } catch (e2) {}
    }
    const b = $('btnCopyLink'), prev = b.textContent; b.textContent = ok ? '✓ 복사됨' : '✗ 복사 실패';
    setTimeout(() => { b.textContent = prev; }, 1500);
  });
  $('btnShare').addEventListener('click', async () => {
    if (!lastShareUrl || !navigator.share) return;
    try { await navigator.share({ title: '무한 프랙탈 줌', url: lastShareUrl }); } catch (e) {}
  });

  // ── 전체화면 / 툴바 ───────────────────────────────────────
  const docEl = document.documentElement;
  const fsRequest = docEl.requestFullscreen || docEl.webkitRequestFullscreen;
  const fsExit = document.exitFullscreen || document.webkitExitFullscreen;
  const fsElement = () => document.fullscreenElement || document.webkitFullscreenElement;
  $('btnFull').addEventListener('click', () => {
    if (!fsRequest) { toolbar.classList.toggle('hidden'); return; }
    if (fsElement()) fsExit.call(document); else fsRequest.call(docEl);
  });
  $('btnHide').addEventListener('click', () => toolbar.classList.add('hidden'));
  $('showTab').addEventListener('click', () => toolbar.classList.remove('hidden'));
  $('btnClose').addEventListener('click', () => { location.href = 'index.html'; });

  // ── 시작 ──────────────────────────────────────────────────
  resize();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
