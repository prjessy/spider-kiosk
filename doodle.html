<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>거미줄 낙서장</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #2b2b2b;
    overflow: hidden;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  /* 모바일: 주소창에 따라 변하는 실제 표시 영역 기준 */
  @supports (height: 100dvh) {
    html, body { height: 100dvh; }
  }

  #stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas#c {
    background: #ffffff;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    cursor: none;
    touch-action: none;
  }

  /* ── 툴바 ─────────────────────────────────────── */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    padding: 6px 10px;
    background: rgba(34, 34, 34, 0.92);
    backdrop-filter: blur(6px);
    color: #ddd;
    font-size: 12px;
    z-index: 100;
    transition: transform 0.25s ease;
  }
  #toolbar.hidden { transform: translateY(-100%); }

  .group {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
    border-right: 1px solid rgba(255,255,255,0.15);
  }
  .group:last-child { border-right: none; margin-left: auto; }

  button {
    background: #3d3d3d;
    border: 1px solid #555;
    color: #eee;
    border-radius: 5px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: #4d4d4d; }
  button:active { background: #5a5a5a; }
  button:disabled { opacity: 0.35; cursor: default; }

  label { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  input[type="range"] { width: 70px; accent-color: #8ab4f8; }
  input[type="color"] {
    width: 26px; height: 22px;
    border: 1px solid #555; border-radius: 4px;
    background: none; padding: 0; cursor: pointer;
  }
  .val { width: 30px; text-align: right; color: #8ab4f8; font-variant-numeric: tabular-nums; }

  /* 툴바 다시 열기 탭 */
  #showTab {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    background: rgba(34,34,34,0.85);
    color: #aaa;
    font-size: 11px;
    padding: 3px 18px;
    border-radius: 0 0 8px 8px;
    cursor: pointer;
    z-index: 99;
    display: none;
  }
  #toolbar.hidden ~ #showTab { display: block; }

  /* 커스텀 커서 */
  #cursor {
    position: fixed;
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,0,0,0.35);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 999;
    display: none;
  }

  #hint {
    position: fixed;
    bottom: 18px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(0,0,0,0.35);
    pointer-events: none;
    z-index: 50;
  }

  input[type="file"] { display: none; }

  /* 좁은 화면(핸드폰): 툴바를 한 줄 가로 스크롤로 — 캔버스 전체보기 확보 */
  @media (max-width: 760px) {
    #toolbar {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #toolbar::-webkit-scrollbar { display: none; }
    .group { flex: 0 0 auto; }
    .group:last-child { margin-left: 0; }
    input[type="range"] { width: 56px; }
    #cursor { display: none !important; }
  }
</style>
</head>
<body>

<div id="stage"><canvas id="c"></canvas></div>

<div id="toolbar">
  <div class="group">
    <button id="btnNew" title="현재 디스플레이 해상도로 새 도화지 (Ctrl+N)">새 도화지</button>
    <button id="btnOpen" title="이미지 열기 (Ctrl+O)">열기</button>
    <button id="btnSave" title="PNG로 저장 (Ctrl+S)">저장</button>
    <button id="btnClose" title="닫기">닫기</button>
  </div>
  <div class="group">
    <button id="btnUndo" title="실행취소 (Ctrl+Z)">↶ 실행취소</button>
    <button id="btnRedo" title="재실행 (Ctrl+Y)">↷ 재실행</button>
  </div>
  <div class="group">
    <label>선 굵기 <input type="range" id="mainW" min="0.1" max="3" step="0.1" value="0.5"><span class="val" id="mainWVal">0.5</span></label>
    <label>보조선 굵기 <input type="range" id="subW" min="0.05" max="2" step="0.05" value="0.3"><span class="val" id="subWVal">0.3</span></label>
    <label>선 색상 <input type="color" id="mainC" value="#000000"></label>
    <label>보조선 색상 <input type="color" id="subC" value="#000000"></label>
    <label>도화지 색상 <input type="color" id="paperC" value="#ffffff"></label>
  </div>
  <div class="group">
    <button id="btnFull" title="전체화면">⛶ 전체화면</button>
    <button id="btnHide" title="툴바 숨기기">▲</button>
  </div>
</div>
<div id="showTab">▼ 메뉴</div>

<div id="cursor"></div>
<div id="hint">드래그하면 거미줄 낙서가 그려집니다</div>
<input type="file" id="fileInput" accept="image/*">

<script>
(() => {
  'use strict';

  // ── 도화지: 현재 디스플레이 해상도에 따른 자동 크기 ──────────
  let W = window.screen.width  || 1920;
  let H = window.screen.height || 1080;

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  canvas.width = W;
  canvas.height = H;
  // 그림은 투명 레이어에 그리고, 도화지 색은 CSS 배경으로 처리
  // → 픽셀 감지(alpha>0)가 도화지 색과 무관하게 정확함

  const cursor = document.getElementById('cursor');
  const toolbar = document.getElementById('toolbar');

  // ── 설정값 ────────────────────────────────────────────────
  const cfg = {
    mainW: 0.5,     // 선 굵기 — 얇은 것이 핵심!
    subW: 0.3,      // 보조선(거미줄 광선) 굵기
    mainC: '#000000',
    subC: '#000000',
    paperC: '#ffffff',
    radius: 250,    // 광선 탐색 반경
    rays: 35        // 이동당 광선 개수
  };

  // ── 상태 ──────────────────────────────────────────────────
  let isDrawing = false;
  let oldx = 0, oldy = 0;
  let dirty = false; // 저장 안 된 변경 여부

  // ── Undo / Redo ───────────────────────────────────────────
  const undoStack = [];
  const redoStack = [];
  const MAX_HISTORY = 30;

  function snapshot() {
    undoStack.push(ctx.getImageData(0, 0, W, H));
    if (undoStack.length > MAX_HISTORY) undoStack.shift();
    redoStack.length = 0;
    updateHistoryButtons();
  }
  function undo() {
    if (!undoStack.length) return;
    redoStack.push(ctx.getImageData(0, 0, W, H));
    ctx.putImageData(undoStack.pop(), 0, 0);
    updateHistoryButtons();
  }
  function redo() {
    if (!redoStack.length) return;
    undoStack.push(ctx.getImageData(0, 0, W, H));
    ctx.putImageData(redoStack.pop(), 0, 0);
    updateHistoryButtons();
  }
  function updateHistoryButtons() {
    document.getElementById('btnUndo').disabled = !undoStack.length;
    document.getElementById('btnRedo').disabled = !redoStack.length;
  }

  // ── 색상 유틸 ─────────────────────────────────────────────
  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // ── 거미줄 광선 (원본 AS3 drawStar 포팅) ──────────────────
  // 마우스 주변으로 랜덤 방향 광선을 쏘아, 이미 그려진 픽셀에
  // 닿은 가장 먼 지점까지 초극세선으로 연결 → 거미줄 형태
  function drawStar(mx, my) {
    const r = cfg.radius;
    // 광선 범위의 픽셀을 한 번만 읽어 캐시 (성능)
    const bx = Math.max(0, Math.floor(mx - r));
    const by = Math.max(0, Math.floor(my - r));
    const bw = Math.min(W, Math.ceil(mx + r)) - bx;
    const bh = Math.min(H, Math.ceil(my + r)) - by;
    if (bw <= 0 || bh <= 0) return;
    const img = ctx.getImageData(bx, by, bw, bh);
    const data = img.data;

    function hasInk(x, y) {
      const ix = Math.round(x) - bx, iy = Math.round(y) - by;
      if (ix < 0 || iy < 0 || ix >= bw || iy >= bh) return false;
      return data[(iy * bw + ix) * 4 + 3] > 0; // alpha > 0
    }

    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = cfg.subC;
    ctx.lineWidth = cfg.subW;
    ctx.beginPath();

    for (let i = 0; i < cfg.rays; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dx = Math.cos(angle), dy = Math.sin(angle);
      let px = mx, py = my;
      let hitX = 0, hitY = 0, hit = false;

      for (let d = 0; d < r; d++) {
        px += dx; py += dy;
        if (hasInk(px, py)) { hitX = px; hitY = py; hit = true; }
      }
      if (hit) {
        ctx.moveTo(mx, my);
        ctx.lineTo(hitX, hitY);
      }
    }
    ctx.stroke();
    ctx.restore();
  }

  // ── 메인 선 ───────────────────────────────────────────────
  function drawLine(x1, y1, x2, y2) {
    ctx.save();
    ctx.strokeStyle = hexToRgba(cfg.mainC, 0.8);
    ctx.lineWidth = cfg.mainW;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();
  }

  // ── 좌표 변환 ─────────────────────────────────────────────
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const sx = W / r.width, sy = H / r.height;
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) * sx, y: (t.clientY - r.top) * sy };
  }

  // ── 입력 이벤트 ───────────────────────────────────────────
  function pointerDown(e) {
    const p = getPos(e);
    snapshot();
    oldx = p.x; oldy = p.y;
    isDrawing = true;
    dirty = true;
    drawStar(p.x, p.y);
  }
  function pointerMove(e) {
    if (!isDrawing) return;
    const p = getPos(e);
    drawStar(p.x, p.y);
    drawLine(oldx, oldy, p.x, p.y);
    oldx = p.x; oldy = p.y;
  }
  function pointerUp(e) {
    if (!isDrawing) return;
    isDrawing = false;
    if (e && !e.touches) {
      const p = getPos(e);
      drawStar(p.x, p.y);
      drawLine(oldx, oldy, p.x, p.y);
    }
  }

  canvas.addEventListener('mousedown', pointerDown);
  window.addEventListener('mousemove', e => {
    cursor.style.display = 'block';
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    pointerMove(e);
  });
  window.addEventListener('mouseup', pointerUp);

  canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerDown(e); }, { passive: false });
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); pointerMove(e); }, { passive: false });
  canvas.addEventListener('touchend',   e => { e.preventDefault(); pointerUp(null); }, { passive: false });

  // ── 메뉴: 새 도화지 ───────────────────────────────────────
  function newPaper() {
    if (dirty && !confirm('현재 그림을 지우고 새 도화지를 만들까요?')) return;
    W = window.screen.width  || 1920;
    H = window.screen.height || 1080;
    canvas.width = W;
    canvas.height = H;
    undoStack.length = 0;
    redoStack.length = 0;
    dirty = false;
    updateHistoryButtons();
    fit();
  }

  // ── 메뉴: 열기 ────────────────────────────────────────────
  const fileInput = document.getElementById('fileInput');
  function openImage() { fileInput.click(); }
  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    if (!f) return;
    const img = new Image();
    img.onload = () => {
      snapshot();
      ctx.clearRect(0, 0, W, H);
      // 캔버스에 맞춰 그리기 (같은 해상도면 1:1)
      const s = Math.min(W / img.width, H / img.height, 1);
      const dw = img.width * s, dh = img.height * s;
      ctx.drawImage(img, (W - dw) / 2, (H - dh) / 2, dw, dh);
      // 저장된 PNG는 도화지 색이 불투명하게 깔려 있으므로,
      // 모서리 색(=도화지 색)과 같은 픽셀을 투명 처리해
      // 거미줄 픽셀 감지가 다시 정상 동작하게 복원
      restoreTransparency();
      dirty = true;
      URL.revokeObjectURL(img.src);
    };
    img.src = URL.createObjectURL(f);
    fileInput.value = '';
  });

  function restoreTransparency() {
    const img = ctx.getImageData(0, 0, W, H);
    const d = img.data;
    // 네 모서리 중 가장 흔한 색을 도화지 색으로 간주
    const corners = [0, (W - 1) * 4, (H - 1) * W * 4, ((H - 1) * W + W - 1) * 4];
    const c = corners.map(i => [d[i], d[i + 1], d[i + 2]]);
    const paper = c[0]; // 좌상단 기준
    if (d[3] === 0) return; // 이미 투명 배경이면 그대로
    const TOL = 12;
    for (let i = 0; i < d.length; i += 4) {
      if (Math.abs(d[i] - paper[0]) <= TOL &&
          Math.abs(d[i + 1] - paper[1]) <= TOL &&
          Math.abs(d[i + 2] - paper[2]) <= TOL) {
        d[i + 3] = 0;
      }
    }
    ctx.putImageData(img, 0, 0);
    // 도화지 색상 피커도 동기화
    const hex = '#' + paper.map(v => v.toString(16).padStart(2, '0')).join('');
    document.getElementById('paperC').value = hex;
    cfg.paperC = hex;
    canvas.style.background = hex;
  }

  // ── 메뉴: 저장 ────────────────────────────────────────────
  function saveImage() {
    const out = document.createElement('canvas');
    out.width = W; out.height = H;
    const octx = out.getContext('2d');
    octx.fillStyle = cfg.paperC;
    octx.fillRect(0, 0, W, H);
    octx.drawImage(canvas, 0, 0);
    const a = document.createElement('a');
    const t = new Date();
    const pad = n => String(n).padStart(2, '0');
    a.download = `거미줄낙서_${t.getFullYear()}${pad(t.getMonth() + 1)}${pad(t.getDate())}_${pad(t.getHours())}${pad(t.getMinutes())}${pad(t.getSeconds())}.png`;
    a.href = out.toDataURL('image/png');
    a.click();
    dirty = false;
  }

  // ── 메뉴: 닫기 ────────────────────────────────────────────
  function closeApp() {
    if (dirty && !confirm('저장하지 않은 그림이 있습니다. 닫을까요?')) return;
    ctx.clearRect(0, 0, W, H);
    dirty = false;
    location.href = 'index.html'; // 메뉴로 돌아가기
  }

  // ── 설정 바인딩 ───────────────────────────────────────────
  const $ = id => document.getElementById(id);
  $('mainW').addEventListener('input', e => { cfg.mainW = +e.target.value; $('mainWVal').textContent = e.target.value; });
  $('subW').addEventListener('input',  e => { cfg.subW = +e.target.value;  $('subWVal').textContent = e.target.value; });
  $('mainC').addEventListener('input', e => { cfg.mainC = e.target.value; });
  $('subC').addEventListener('input',  e => { cfg.subC = e.target.value; });
  $('paperC').addEventListener('input', e => {
    cfg.paperC = e.target.value;
    canvas.style.background = e.target.value;
  });

  $('btnNew').addEventListener('click', newPaper);
  $('btnOpen').addEventListener('click', openImage);
  $('btnSave').addEventListener('click', saveImage);
  $('btnClose').addEventListener('click', closeApp);
  $('btnUndo').addEventListener('click', undo);
  $('btnRedo').addEventListener('click', redo);
  // 전체화면: 표준 + webkit(구형 안드로이드/사파리) 폴백,
  // 둘 다 없는 iOS 사파리에서는 툴바를 숨겨 유사 전체화면으로 동작
  const docEl = document.documentElement;
  const fsRequest = docEl.requestFullscreen || docEl.webkitRequestFullscreen;
  const fsExit = document.exitFullscreen || document.webkitExitFullscreen;
  const fsElement = () => document.fullscreenElement || document.webkitFullscreenElement;
  $('btnFull').addEventListener('click', () => {
    if (!fsRequest) { // iOS 등 미지원 브라우저
      toolbar.classList.toggle('hidden');
      fit();
      return;
    }
    if (fsElement()) fsExit.call(document);
    else fsRequest.call(docEl);
  });
  $('btnHide').addEventListener('click', () => toolbar.classList.add('hidden'));
  $('showTab').addEventListener('click', () => toolbar.classList.remove('hidden'));

  // 단축키
  window.addEventListener('keydown', e => {
    if (!e.ctrlKey) return;
    const k = e.key.toLowerCase();
    if (k === 'z') { e.preventDefault(); undo(); }
    else if (k === 'y') { e.preventDefault(); redo(); }
    else if (k === 's') { e.preventDefault(); saveImage(); }
    else if (k === 'n') { e.preventDefault(); newPaper(); }
    else if (k === 'o') { e.preventDefault(); openImage(); }
  });

  // ── 화면 맞춤 (비율 유지) ─────────────────────────────────
  // 모바일은 주소창 때문에 innerHeight가 실제 표시 영역과 다를 수 있어
  // visualViewport 기준으로 계산 → 캔버스가 잘리지 않고 전체가 보임
  function fit() {
    const vv = window.visualViewport;
    const tbH = toolbar.classList.contains('hidden') ? 0 : toolbar.offsetHeight;
    const availW = vv ? vv.width : window.innerWidth;
    const availH = (vv ? vv.height : window.innerHeight) - tbH;
    const s = Math.min(availW / W, availH / H);
    canvas.style.width = (W * s) + 'px';
    canvas.style.height = (H * s) + 'px';
    document.getElementById('stage').style.top = tbH + 'px';
  }
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', () => setTimeout(fit, 250));
  if (window.visualViewport) window.visualViewport.addEventListener('resize', fit);
  new ResizeObserver(fit).observe(toolbar);
  fit();
  updateHistoryButtons();

})();
</script>
</body>
</html>
