<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Fractal Universe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0806;
    overflow: hidden;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    user-select: none; -webkit-user-select: none;
  }
  @supports (height: 100dvh) { html, body { height: 100dvh; } }

  body { display: flex; align-items: center; justify-content: center; }

  /* 첫 화면: 이미지(1080×1920)의 비율을 그대로 유지한 컨테이너.
     화면이 더 길거나 넓으면 위아래/좌우에 어두운 여백이 생기지만,
     덕분에 메뉴 클릭 영역이 그림과 항상 정확히 맞음. */
  .screen {
    position: relative;
    aspect-ratio: 1080 / 1920;
    height: 100vh; max-width: 100vw; width: auto;
    background: #0a0806 url('home.png') center / cover no-repeat;
  }
  @supports (height: 100dvh) { .screen { height: 100dvh; } }

  /* 01~04 메뉴 클릭 영역 — 그림에 박힌 글자 위에 겹쳐진 투명 버튼.
     좌표는 이미지 비율(%) 기준이라 화면 크기가 달라도 따라감. */
  .hot {
    position: absolute;
    left: 4%; width: 60%;
    text-decoration: none;
    border-radius: 10px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s, box-shadow 0.12s;
  }
  .hot:hover, .hot:active {
    background: linear-gradient(90deg, rgba(201,162,90,0.28), rgba(201,162,90,0));
    box-shadow: inset 0 0 0 1px rgba(236,212,154,0.55);
  }
  #m1 { top: 70.4%; height: 3.8%; }
  #m2 { top: 74.35%; height: 3.8%; }
  #m3 { top: 78.3%; height: 3.8%; }
  #m4 { top: 82.25%; height: 3.8%; }

  /* 관리자 진입(은밀): 우측 하단 모서리 탭 */
  .admin { position: absolute; right: 0; bottom: 0; width: 70px; height: 70px; }
</style>
</head>
<body>
  <div class="screen">
    <a class="hot" id="m1" href="doodle.html"    aria-label="01 fractal canvas"></a>
    <a class="hot" id="m2" href="guestbook.html" aria-label="02 fractal photo"></a>
    <a class="hot" id="m3" href="triangle.html"  aria-label="03 fractal mosaic"></a>
    <a class="hot" id="m4" href="fractal.html"   aria-label="04 fractal zoom"></a>
    <a class="admin" href="admin.html" aria-label="관리"></a>
  </div>
</body>
</html>
