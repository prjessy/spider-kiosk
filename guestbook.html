<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #16161d;
    color: #eee;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .screen {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
  }
  .screen.active { display: flex; }

  h1 { font-size: 42px; letter-spacing: 0.08em; }
  .sub { color: #9aa; font-size: 16px; }

  .bigbtn {
    background: linear-gradient(135deg, #5b8def, #7c5bef);
    border: none; color: #fff;
    font-size: 24px; font-family: inherit;
    padding: 20px 64px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(91, 141, 239, 0.4);
    transition: transform 0.1s;
  }
  .bigbtn:active { transform: scale(0.96); }

  button.ctrl, a.ctrl {
    display: inline-block;
    background: #2e2e3a;
    border: 1px solid #4a4a5a;
    color: #eee;
    font-size: 17px; font-family: inherit;
    padding: 13px 28px;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
  }
  button.ctrl:active, a.ctrl:active { background: #44445a; }
  button.ctrl.primary, a.ctrl.primary { background: #5b8def; border-color: #5b8def; }
  button.ctrl.on { background: #5b8def; border-color: #5b8def; }
  button.ctrl:disabled { opacity: 0.4; cursor: default; }

  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 94vw; }

  /* ── 시작 화면: 최근 방명록 ── */
  #recentWrap { max-width: 900px; }
  #recentWrap h3 { font-size: 14px; color: #889; font-weight: normal; margin-bottom: 10px; text-align: center; }
  #recent {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  #recent img {
    width: 130px; border-radius: 8px;
    border: 1px solid #333;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    display: block;
  }
  .recent-cell { position: relative; display: inline-block; }
  .recent-del {
    position: absolute; top: -8px; right: -8px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #c0392b; color: #fff;
    border: 2px solid #16161d;
    font-size: 14px; line-height: 1;
    padding: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  .recent-del:active { background: #e05548; }

  /* ── 카메라 화면 ── */
  #camWrap { position: relative; }
  video, #photoWrap canvas {
    aspect-ratio: 16 / 9;
    border-radius: 14px;
    background: #000;
    display: block;
  }
  /* 카메라 미리보기: 핸드폰에서 화면을 꽉 차게(풀사이즈)로 크게 표시 */
  video { width: min(96vw, calc(82vh * 16 / 9)); transform: scaleX(-1); object-fit: cover; }
  /* 꾸미기 사진: 위쪽 보내기 버튼 + 꾸미기 도구가 들어갈 자리를 위해 조금 작게 */
  #photoWrap canvas { width: min(82vw, calc(56vh * 16 / 9)); }

  /* 핸드폰(좁은 화면): 카메라 미리보기를 폭 가득 */
  @media (max-width: 760px) {
    video { width: 96vw; }
  }
  /* 낮은 화면(가로 모드 폰 등): 도구막대가 스크롤 없이 다 보이게 사진을 줄임 */
  @media (max-height: 720px) {
    video { width: min(96vw, calc(72vh * 16 / 9)); }
    #photoWrap canvas { width: min(82vw, calc(42vh * 16 / 9)); }
  }
  /* 그래도 넘칠 때를 대비해 꾸미기 화면은 세로 스크롤 허용(최후 안전장치) */
  #scrDecorate { overflow-y: auto; padding: 10px 0; }

  /* ── 꾸미기 옵션 패널(접기/펴기) ── */
  #decoratePanel {
    display: flex; flex-direction: column; gap: 12px;
    align-items: center;
    width: 100%;
  }
  #decoratePanel.closed { display: none; }
  #btnDecorate.on { background: #5b8def; border-color: #5b8def; }

  #countdown {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    font-size: 160px; font-weight: bold;
    color: #fff;
    text-shadow: 0 0 40px rgba(0,0,0,0.8);
  }

  #flash {
    position: fixed; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 1000;
    transition: opacity 0.4s;
  }

  /* ── 꾸미기 화면 ── */
  #photoWrap { position: relative; }
  #photoWrap canvas { position: absolute; top: 0; left: 0; height: 100%; }
  #photoWrap canvas:first-child { position: relative; }
  /* 낙서 레이어는 투명해야 아래 사진이 그대로 보임.
     '#photoWrap canvas' 규칙(specificity 1,0,1)을 이기려면 '#photoWrap #doodleCanvas'(2,0,0)로 올려야 함 */
  #photoWrap #doodleCanvas { cursor: crosshair; touch-action: none; background: transparent; }
  #photoWrap #overlayCanvas { touch-action: none; background: transparent; pointer-events: none; }
  #photoWrap #frameCanvas { background: transparent; pointer-events: none; }
  .ctrl.sticker { font-size: 22px; padding: 6px 10px; line-height: 1; }

  .penbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; font-size: 14px; max-width: 94vw; }
  .swatch {
    flex: 0 0 auto;          /* 좁은 화면(아이폰)에서 빈 div가 0폭으로 찌그러지는 것 방지 */
    width: 34px; height: 34px;
    min-width: 34px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    -webkit-appearance: none;
    background-clip: padding-box;
  }
  .swatch.sel { border-color: #5b8def; }
  input[type="range"] { width: 110px; accent-color: #8ab4f8; }

  /* ── 전송 화면 ── */
  #qrBox {
    background: #fff;
    padding: 22px;
    border-radius: 18px;
    display: none;
  }
  #qrBox img { display: block; width: 300px; height: 300px; image-rendering: pixelated; }
  #spinner {
    width: 56px; height: 56px;
    border: 5px solid #333;
    border-top-color: #5b8def;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #progWrap { width: 320px; max-width: 80vw; display: none; }
  #progBar { height: 14px; background: #2a2f3a; border-radius: 8px; overflow: hidden; }
  #progFill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #5b8def, #7aa7ff);

  }
  #progText { text-align: center; font-size: 15px; color: #aab; margin-top: 8px; }
  #sendMsg { font-size: 20px; text-align: center; line-height: 1.6; }
  #sendMsg small { color: #889; font-size: 14px; }
  #urlText { font-size: 12px; color: #667; word-break: break-all; max-width: 70vw; text-align: center; }
</style>
</head>

<script>
(() => {
  'use strict';

  const UPLOAD_API = 'https://tmpfiles.org/api/v1/upload';
  const PHOTO_W = 1280, PHOTO_H = 720;

  const $ = id => document.getElementById(id);
  const screens = ['scrStart', 'scrCamera', 'scrDecorate', 'scrSend'];
  function show(id) {
    screens.forEach(s => $(s).classList.toggle('active', s === id));
  }

  let stream = null;
  let resetTimer = null;

  // ─────────────────────────────────────────────────────────
  // 사운드: 효과음(WebAudio, 파일 불필요) + 배경음악(선택 파일 bgm.mp3)
  // ─────────────────────────────────────────────────────────
  const Sfx = (() => {
    let ctx = null, on = (localStorage.getItem('gb_sfx') !== 'off');
    let customShutter = null;   // 사용자가 불러온 셔터 효과음 파일(있으면 합성음 대신 재생)
    function ac() {
      if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
      if (ctx && ctx.state === 'suspended') ctx.resume();
      return ctx;
    }
    // play: on/off 상태와 무관하게 무조건 재생(미리듣기용). tone: on일 때만(실제 촬영 효과음).
    function play(freq, dur, type, gain) {
      const c = ac(); if (!c) return;
      const o = c.createOscillator(), g = c.createGain();
      o.type = type || 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(gain || 0.18, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + dur);
    }
    function tone(freq, dur, type, gain) { if (on) play(freq, dur, type, gain); }
    function shutterSound() {
      if (customShutter) { try { customShutter.currentTime = 0; customShutter.play().catch(() => {}); } catch (e) {} return; }
      play(1200, 0.05, 'square', 0.12); setTimeout(() => play(300, 0.08, 'square', 0.1), 45);
    }
    return {
      beep: (f, d) => tone(f, d || 0.12, 'sine', 0.16),
      shutter: () => { if (on) shutterSound(); },
      // 버튼 미리듣기: 상태와 무관하게 항상 소리를 냄. on=true면 셔터음, false면 '끔' 신호음
      demo: (isOn) => { ac(); if (isOn) shutterSound(); else { play(440, 0.1, 'sine', 0.14); setTimeout(() => play(330, 0.12, 'sine', 0.12), 90); } },
      // 사용자 효과음(셔터) 파일 지정 — 미리 한 번 재생해 들려주고 활성화
      setShutter: (url) => {
        customShutter = new Audio(url);
        customShutter.volume = 0.7;
        if (!on) { on = true; localStorage.setItem('gb_sfx', 'on'); }
        ac();
        try { customShutter.play().catch(() => {}); } catch (e) {}
      },
      hasCustom: () => !!customShutter,
      isOn: () => on,
      toggle: () => { on = !on; localStorage.setItem('gb_sfx', on ? 'on' : 'off'); if (on) ac(); return on; },
      prime: () => ac()   // 사용자 제스처에서 오디오컨텍스트 활성화
    };
  })();

  // 배경음악: 같은 폴더에 bgm.mp3 가 있으면 재생(없으면 토글이 조용히 무시됨)
  const Bgm = (() => {
    let audio = null, want = false, src = 'bgm.mp3';   // 기본: 같은 폴더의 bgm.mp3
    function el() {
      if (!audio) {
        audio = new Audio(src);
        audio.loop = true;
        audio.volume = 0.35;
      }
      return audio;
    }
    let custom = false;   // 사용자가 음악 파일을 불러왔는지
    return {
      // 사용자가 불러온 음악 파일로 교체 후 바로 재생
      setSrc: (url) => {
        src = url; custom = true;
        if (audio) { audio.pause(); audio = null; }
        want = true;
        el().play().catch(() => {});
        return want;
      },
      // 반환값: true=재생 중, false=사용자가 끔, 'nosrc'=재생할 음원 없음(파일 선택 유도)
      toggle: () => {
        if (want) { el().pause(); want = false; return false; }
        if (!custom) return 'nosrc';            // 기본 bgm.mp3 없음 + 파일 미선택
        want = true;
        const p = el().play();
        if (p && p.catch) p.catch(() => {});
        return true;
      },
      isOn: () => want
    };
  })();

  // ─────────────────────────────────────────────────────────
  // 시작 화면: 최근 방명록 (IndexedDB 원본 저장 + Firebase 동기화)
  // 모든 기록은 admin.html(기록 관리)에서 보관·관리됨
  // ─────────────────────────────────────────────────────────
  async function loadRecent() {
    let entries = [];
    try { entries = await GuestbookStore.list(); } catch (e) {}
    const wrap = $('recentWrap'), box = $('recent');
    box.innerHTML = '';
    if (!entries.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    entries.slice(0, 12).forEach(en => {
      const cell = document.createElement('div');
      cell.className = 'recent-cell';

      const img = new Image();
      img.src = en.th || en.d;
      img.title = en.label || new Date(en.t).toLocaleString('ko-KR');
      cell.appendChild(img);

      const del = document.createElement('button');
      del.className = 'recent-del';
      del.textContent = '✕';
      del.title = '이 기록 삭제';
      del.addEventListener('click', async (ev) => {
        ev.stopPropagation();
        if (!confirm('이 방명록 기록을 삭제할까요?')) return;
        try { await GuestbookStore.remove(en.id); } catch (e) {}
        loadRecent();
      });
      cell.appendChild(del);

      box.appendChild(cell);
    });
  }
  function makeThumb(canvas) {
    const th = document.createElement('canvas');
    th.width = 220; th.height = Math.round(220 * PHOTO_H / PHOTO_W);
    th.getContext('2d').drawImage(canvas, 0, 0, th.width, th.height);
    return th.toDataURL('image/jpeg', 0.75);
  }
  // 구버전 localStorage 기록 이전 → 원격 동기화 → 목록 표시
  (async () => {
    try { await GuestbookStore.migrateLegacy(); } catch (e) {}
    loadRecent();
    try { await GuestbookStore.syncAll(); loadRecent(); } catch (e) {}
  })();

  // ─────────────────────────────────────────────────────────
  // 카메라
  // ─────────────────────────────────────────────────────────
  const video = $('video');
  let facing = 'user';   // 'user'(전면) | 'environment'(후면)

  async function startCamera() {
    show('scrCamera');
    $('camError').style.display = 'none';
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: PHOTO_W }, height: { ideal: PHOTO_H }, facingMode: facing },
        audio: false
      });
      video.srcObject = stream;
      // iOS Safari는 srcObject만 설정하면 재생되지 않아 검정 화면이 됨 → 명시적으로 play() 호출
      video.setAttribute('playsinline', '');
      video.muted = true;
      // 전면 카메라만 거울 모드(좌우 반전), 후면은 그대로
      video.style.transform = (facing === 'user') ? 'scaleX(-1)' : 'none';
      try { await video.play(); } catch (e) {}
      // videoWidth가 준비될 때까지 대기 (준비 전 캡처하면 검정으로 그려짐)
      if (!video.videoWidth) {
        await new Promise(res => {
          const done = () => { video.removeEventListener('loadedmetadata', done); res(); };
          video.addEventListener('loadedmetadata', done);
          setTimeout(done, 3000);
        });
      }
      return true;
    } catch (err) {
      const e = $('camError');
      e.style.display = 'block';
      e.textContent = '카메라를 사용할 수 없습니다: ' + err.message +
        ' (브라우저 카메라 권한을 허용했는지, 다른 프로그램이 웹캠을 쓰고 있지 않은지 확인하세요)';
      return false;
    }
  }
  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
  }
  // 전/후면 전환 — 실패(해당 카메라 없음) 시 이전 카메라로 복귀
  async function flipCamera() {
    const prev = facing;
    facing = (facing === 'user') ? 'environment' : 'user';
    stopCamera();
    const ok = await startCamera();
    if (!ok) { facing = prev; stopCamera(); await startCamera(); }
  }

  // 촬영: 3초 카운트다운 → 캡처
  let shooting = false;
  async function shoot() {
    if (shooting || !stream) return;
    shooting = true;
    const cd = $('countdown');
    cd.style.display = 'flex';
    for (let n = 3; n >= 1; n--) {
      cd.textContent = n;
      Sfx.beep(660, 0.12);              // 카운트다운 틱
      await new Promise(r => setTimeout(r, 1000));
    }
    cd.style.display = 'none';
    shooting = false;
    Sfx.shutter();                      // 셔터음

    // 플래시 효과
    const flash = $('flash');
    flash.style.transition = 'none';
    flash.style.opacity = '0.9';
    requestAnimationFrame(() => {
      flash.style.transition = 'opacity 0.5s';
      flash.style.opacity = '0';
    });

    capture();
  }

  // ─────────────────────────────────────────────────────────
  // 캡처 & 꾸미기 (거미줄 펜)
  // ─────────────────────────────────────────────────────────
  const photoCanvas = $('photoCanvas');
  const doodleCanvas = $('doodleCanvas');
  const pctx = photoCanvas.getContext('2d');
  const dctx = doodleCanvas.getContext('2d', { willReadFrequently: true });
  photoCanvas.width = doodleCanvas.width = PHOTO_W;
  photoCanvas.height = doodleCanvas.height = PHOTO_H;

  function capture() {
    // 미리보기와 같게 캡처 (전면은 좌우 반전, 후면은 그대로)
    pctx.save();
    if (facing === 'user') { pctx.translate(PHOTO_W, 0); pctx.scale(-1, 1); }
    // cover 방식으로 비율 맞추기
    const vw = video.videoWidth || PHOTO_W, vh = video.videoHeight || PHOTO_H;
    const s = Math.max(PHOTO_W / vw, PHOTO_H / vh);
    const dw = vw * s, dh = vh * s;
    pctx.drawImage(video, (PHOTO_W - dw) / 2, (PHOTO_H - dh) / 2, dw, dh);
    pctx.restore();

    // 날짜 스탬프
    pctx.save();
    pctx.font = '22px "Malgun Gothic", sans-serif';
    pctx.textAlign = 'right';
    pctx.shadowColor = 'rgba(0,0,0,0.7)';
    pctx.shadowBlur = 6;
    pctx.fillStyle = 'rgba(255,255,255,0.92)';
    pctx.fillText('방명록 · ' + new Date().toLocaleString('ko-KR', {
      year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
    }), PHOTO_W - 24, PHOTO_H - 22);
    pctx.restore();

    dctx.clearRect(0, 0, PHOTO_W, PHOTO_H);
    undoStack.length = 0;
    redoStack.length = 0;
    pen.erase = false;
    $('btnEraser').classList.remove('on');
    updateUndoButtons();
    // 스티커·글자 초기화 + 그리기 모드로
    items = [];
    selected = -1;
    setPlaceMode(false);
    // 꾸미기 패널은 접은 상태로 시작 (주기능: 보내기)
    $('decoratePanel').classList.add('closed');
    $('btnDecorate').classList.remove('on');
    // 프레임 초기화
    frameStyle = 0;
    drawFrame();
    document.querySelectorAll('.frame').forEach(x => x.classList.toggle('on', x.dataset.f === '0'));
    stopCamera();
    show('scrDecorate');

    // 촬영 즉시 기록 저장 (보내기 전에 이탈해도 기록이 남음)
    currentEntryId = GuestbookStore.newId();
    GuestbookStore.add({
      id: currentEntryId,
      t: new Date().toISOString(),
      d: photoCanvas.toDataURL('image/jpeg', 0.85),
      th: makeThumb(photoCanvas)
    });
  }

  // ── 거미줄 펜 (낙서장과 동일한 알고리즘, 낙서 레이어에만 반응) ──
  const pen = { color: '#ffffff', width: 2, radius: 150, rays: 12, erase: false };
  let drawing = false, ox = 0, oy = 0, lastStarX = 0, lastStarY = 0;
  const STAR_STEP = 10;            // 이만큼 움직였을 때만 거미줄 생성 (성능)
  const ERASE_W = 28;             // 지우개 굵기

  // ── 영역 기반 실행취소/다시실행 (전체 캔버스 대신 변경된 영역만 저장 → 메모리 절약) ──
  const undoStack = [];           // { x, y, img }
  const redoStack = [];
  const MAX_UNDO = 30;
  let strokeBox = null, strokeBefore = null;   // 현재 획이 건드린 영역의 '이전' 상태

  // 그리기 직전, 건드릴 영역(bx,by,bw,bh)의 이전 픽셀을 누적 캡처
  function captureRegion(nx, ny, nw, nh) {
    nx = Math.max(0, Math.floor(nx)); ny = Math.max(0, Math.floor(ny));
    nw = Math.min(PHOTO_W, Math.ceil(nx + nw)) - nx;
    nh = Math.min(PHOTO_H, Math.ceil(ny + nh)) - ny;
    if (nw <= 0 || nh <= 0) return;
    if (!strokeBox) {
      strokeBefore = dctx.getImageData(nx, ny, nw, nh);
      strokeBox = { x: nx, y: ny, w: nw, h: nh };
      return;
    }
    const b = strokeBox;
    if (nx >= b.x && ny >= b.y && nx + nw <= b.x + b.w && ny + nh <= b.y + b.h) return; // 이미 포함
    // 합집합 영역으로 확장: 기존 영역은 보존된 이전값을, 새 영역은 현재(아직 안 그린) 값을 사용
    const ux = Math.min(b.x, nx), uy = Math.min(b.y, ny);
    const uw = Math.max(b.x + b.w, nx + nw) - ux;
    const uh = Math.max(b.y + b.h, ny + nh) - uy;
    const buf = dctx.getImageData(ux, uy, uw, uh);
    const dx = b.x - ux, dy = b.y - uy;
    for (let row = 0; row < b.h; row++) {
      const src = (row * b.w) * 4;
      const dst = ((row + dy) * uw + dx) * 4;
      buf.data.set(strokeBefore.data.subarray(src, src + b.w * 4), dst);
    }
    strokeBefore = buf;
    strokeBox = { x: ux, y: uy, w: uw, h: uh };
  }
  function commitStroke() {
    if (strokeBox) {
      undoStack.push({ x: strokeBox.x, y: strokeBox.y, img: strokeBefore });
      if (undoStack.length > MAX_UNDO) undoStack.shift();
      redoStack.length = 0;
    }
    strokeBox = null; strokeBefore = null;
    updateUndoButtons();
  }
  function updateUndoButtons() {
    $('btnDoodleUndo').disabled = !undoStack.length;
    $('btnDoodleRedo').disabled = !redoStack.length;
  }

  function drawStar(mx, my) {
    const r = pen.radius;
    const bx = Math.max(0, Math.floor(mx - r));
    const by = Math.max(0, Math.floor(my - r));
    const bw = Math.min(PHOTO_W, Math.ceil(mx + r)) - bx;
    const bh = Math.min(PHOTO_H, Math.ceil(my + r)) - by;
    if (bw <= 0 || bh <= 0) return;
    const data = dctx.getImageData(bx, by, bw, bh).data;
    captureRegion(bx, by, bw, bh);

    dctx.save();
    dctx.globalAlpha = 0.25;
    dctx.strokeStyle = pen.color;
    dctx.lineWidth = Math.max(0.3, pen.width * 0.25); // 보조선은 항상 얇게
    dctx.beginPath();
    for (let i = 0; i < pen.rays; i++) {
      const a = Math.random() * Math.PI * 2;
      const dx = Math.cos(a), dy = Math.sin(a);
      let px = mx, py = my, hx = 0, hy = 0, hit = false;
      for (let d = 0; d < r; d++) {
        px += dx; py += dy;
        const ix = Math.round(px) - bx, iy = Math.round(py) - by;
        if (ix >= 0 && iy >= 0 && ix < bw && iy < bh && data[(iy * bw + ix) * 4 + 3] > 0) {
          hx = px; hy = py; hit = true;
        }
      }
      if (hit) { dctx.moveTo(mx, my); dctx.lineTo(hx, hy); }
    }
    dctx.stroke();
    dctx.restore();
  }
  function drawLine(x1, y1, x2, y2) {
    const lw = pen.erase ? ERASE_W : pen.width;
    const pad = lw / 2 + 1;
    captureRegion(Math.min(x1, x2) - pad, Math.min(y1, y2) - pad,
            Math.abs(x1 - x2) + pad * 2, Math.abs(y1 - y2) + pad * 2);
    dctx.save();
    if (pen.erase) {
      dctx.globalCompositeOperation = 'destination-out';
      dctx.lineWidth = ERASE_W;
    } else {
      dctx.globalAlpha = 0.9;
      dctx.strokeStyle = pen.color;
      dctx.lineWidth = pen.width;
    }
    dctx.lineCap = 'round';
    dctx.beginPath();
    dctx.moveTo(x1, y1);
    dctx.lineTo(x2, y2);
    dctx.stroke();
    dctx.restore();
  }

  function dpos(e) {
    const r = doodleCanvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) * PHOTO_W / r.width, y: (t.clientY - r.top) * PHOTO_H / r.height };
  }
  function dDown(e) {
    const p = dpos(e);
    drawing = true; ox = p.x; oy = p.y; lastStarX = p.x; lastStarY = p.y;
    if (pen.erase) {
      drawLine(p.x, p.y, p.x, p.y);   // 점 지우기
    } else {
      drawStar(p.x, p.y);
    }
  }
  function dMove(e) {
    if (!drawing) return;
    const p = dpos(e);
    drawLine(ox, oy, p.x, p.y);
    if (!pen.erase) {
      // 일정 거리 이상 움직였을 때만 거미줄 생성 (getImageData 호출 절감)
      const dx = p.x - lastStarX, dy = p.y - lastStarY;
      if (dx * dx + dy * dy >= STAR_STEP * STAR_STEP) {
        drawStar(p.x, p.y);
        lastStarX = p.x; lastStarY = p.y;
      }
    }
    ox = p.x; oy = p.y;
  }
  function dUp() { if (drawing) { drawing = false; commitStroke(); } }
  doodleCanvas.addEventListener('mousedown', dDown);
  doodleCanvas.addEventListener('mousemove', dMove);
  window.addEventListener('mouseup', dUp);
  doodleCanvas.addEventListener('touchstart', e => { e.preventDefault(); dDown(e); }, { passive: false });
  doodleCanvas.addEventListener('touchmove',  e => { e.preventDefault(); dMove(e); }, { passive: false });
  doodleCanvas.addEventListener('touchend',   e => { e.preventDefault(); dUp(); }, { passive: false });

  document.querySelectorAll('.swatch').forEach(s => {
    s.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(x => x.classList.remove('sel'));
      s.classList.add('sel');
      pen.color = s.dataset.c;
      pen.erase = false;
      $('btnEraser').classList.remove('on');
    });
  });
  $('penW').addEventListener('input', e => { pen.width = +e.target.value; });
  $('btnEraser').addEventListener('click', () => {
    pen.erase = !pen.erase;
    $('btnEraser').classList.toggle('on', pen.erase);
  });
  $('btnDoodleUndo').addEventListener('click', () => {
    if (!undoStack.length) return;
    const u = undoStack.pop();
    redoStack.push({ x: u.x, y: u.y, img: dctx.getImageData(u.x, u.y, u.img.width, u.img.height) });
    dctx.putImageData(u.img, u.x, u.y);
    updateUndoButtons();
  });
  $('btnDoodleRedo').addEventListener('click', () => {
    if (!redoStack.length) return;
    const r = redoStack.pop();
    undoStack.push({ x: r.x, y: r.y, img: dctx.getImageData(r.x, r.y, r.img.width, r.img.height) });
    dctx.putImageData(r.img, r.x, r.y);
    updateUndoButtons();
  });
  $('btnDoodleClear').addEventListener('click', () => {
    undoStack.push({ x: 0, y: 0, img: dctx.getImageData(0, 0, PHOTO_W, PHOTO_H) });
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack.length = 0;
    dctx.clearRect(0, 0, PHOTO_W, PHOTO_H);
    updateUndoButtons();
  });

  // ─────────────────────────────────────────────────────────
  // 스티커 · 텍스트 오버레이 (사진 위에 배치/이동)
  // ─────────────────────────────────────────────────────────
  const overlayCanvas = $('overlayCanvas');
  const octx = overlayCanvas.getContext('2d');
  overlayCanvas.width = PHOTO_W;
  overlayCanvas.height = PHOTO_H;
  let items = [];        // { kind:'emoji'|'text', text, x, y, size, color }
  let selected = -1;
  let placeMode = false;

  const EMOJI_FONT = '"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
  const TEXT_FONT  = '"Malgun Gothic","Apple SD Gothic Neo",sans-serif';

  function itemFont(it) {
    return `${it.size}px ${it.kind === 'text' ? TEXT_FONT : EMOJI_FONT}`;
  }
  function itemWidth(it) {
    octx.save(); octx.font = itemFont(it);
    const w = octx.measureText(it.text).width;
    octx.restore();
    return w;
  }
  function renderOverlay(forFinal) {
    octx.clearRect(0, 0, PHOTO_W, PHOTO_H);
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';
    items.forEach((it, i) => {
      octx.save();
      octx.font = itemFont(it);
      if (it.kind === 'text') {
        octx.fillStyle = it.color;
        octx.shadowColor = 'rgba(0,0,0,0.6)';
        octx.shadowBlur = Math.max(2, it.size * 0.06);
      }
      octx.fillText(it.text, it.x, it.y);
      octx.restore();
      if (!forFinal && i === selected) {
        const w = itemWidth(it), h = it.size;
        octx.save();
        octx.strokeStyle = '#5b8def';
        octx.lineWidth = 3;
        octx.setLineDash([10, 7]);
        octx.strokeRect(it.x - w / 2 - 10, it.y - h / 2 - 10, w + 20, h + 20);
        octx.restore();
      }
    });
  }
  function hitItem(x, y) {
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i], w = itemWidth(it), h = it.size;
      if (x >= it.x - w / 2 - 10 && x <= it.x + w / 2 + 10 &&
          y >= it.y - h / 2 - 10 && y <= it.y + h / 2 + 10) return i;
    }
    return -1;
  }
  function setPlaceMode(on) {
    placeMode = on;
    overlayCanvas.style.pointerEvents = on ? 'auto' : 'none';
    $('decobar').style.display = on ? 'flex' : 'none';
    $('btnModePlace').classList.toggle('on', on);
    $('btnModeDraw').classList.toggle('on', !on);
    if (!on) selected = -1;
    renderOverlay();
  }
  function addItem(kind, text) {
    setPlaceMode(true);
    const size = +$('itemSize').value || 96;
    items.push({ kind, text, x: PHOTO_W / 2, y: PHOTO_H / 2, size, color: pen.color });
    selected = items.length - 1;
    renderOverlay();
  }

  // 드래그
  let oDragging = false, oDX = 0, oDY = 0;
  function opos(e) {
    const r = overlayCanvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) * PHOTO_W / r.width, y: (t.clientY - r.top) * PHOTO_H / r.height };
  }
  function oDown(e) {
    const p = opos(e);
    const i = hitItem(p.x, p.y);
    selected = i;
    if (i >= 0) {
      oDragging = true;
      oDX = p.x - items[i].x; oDY = p.y - items[i].y;
      $('itemSize').value = items[i].size;
    }
    renderOverlay();
  }
  function oMove(e) {
    if (!oDragging || selected < 0) return;
    const p = opos(e);
    items[selected].x = p.x - oDX;
    items[selected].y = p.y - oDY;
    renderOverlay();
  }
  overlayCanvas.addEventListener('mousedown', oDown);
  overlayCanvas.addEventListener('mousemove', oMove);
  window.addEventListener('mouseup', () => { oDragging = false; });
  overlayCanvas.addEventListener('touchstart', e => { e.preventDefault(); oDown(e); }, { passive: false });
  overlayCanvas.addEventListener('touchmove',  e => { e.preventDefault(); oMove(e); }, { passive: false });
  overlayCanvas.addEventListener('touchend',   e => { e.preventDefault(); oDragging = false; }, { passive: false });

  $('btnModeDraw').addEventListener('click', () => setPlaceMode(false));
  $('btnModePlace').addEventListener('click', () => setPlaceMode(true));
  document.querySelectorAll('.sticker').forEach(b => {
    b.addEventListener('click', () => addItem('emoji', b.dataset.e));
  });
  $('btnAddText').addEventListener('click', () => {
    const v = $('textInput').value.trim();
    if (!v) return;
    addItem('text', v);
    $('textInput').value = '';
  });
  $('itemSize').addEventListener('input', e => {
    if (selected >= 0) { items[selected].size = +e.target.value; renderOverlay(); }
  });
  $('btnDelItem').addEventListener('click', () => {
    if (selected >= 0) { items.splice(selected, 1); selected = -1; renderOverlay(); }
  });

  // ─────────────────────────────────────────────────────────
  // 프레임(테두리) 오버레이
  // ─────────────────────────────────────────────────────────
  const frameCanvas = $('frameCanvas');
  const fctx = frameCanvas.getContext('2d');
  frameCanvas.width = PHOTO_W;
  frameCanvas.height = PHOTO_H;
  let frameStyle = 0;

  function cornerWeb(cx, cy, r, a0, a1) {
    const spokes = 6;
    fctx.strokeStyle = 'rgba(255,255,255,0.8)';
    fctx.lineWidth = 1.6;
    for (let i = 0; i <= spokes; i++) {
      const a = a0 + (a1 - a0) * i / spokes;
      fctx.beginPath();
      fctx.moveTo(cx, cy);
      fctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
      fctx.stroke();
    }
    for (let ring = 1; ring <= 4; ring++) {
      const rr = r * ring / 4;
      fctx.beginPath();
      for (let i = 0; i <= spokes; i++) {
        const a = a0 + (a1 - a0) * i / spokes;
        const x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
        i === 0 ? fctx.moveTo(x, y) : fctx.lineTo(x, y);
      }
      fctx.stroke();
    }
  }
  function drawFrame() {
    fctx.clearRect(0, 0, PHOTO_W, PHOTO_H);
    const m = 18, W = PHOTO_W, H = PHOTO_H;
    fctx.save();
    if (frameStyle === 1) {            // 거미줄: 가는 테두리 + 네 모서리 거미줄
      fctx.strokeStyle = 'rgba(255,255,255,0.85)';
      fctx.lineWidth = 4;
      fctx.strokeRect(m, m, W - 2 * m, H - 2 * m);
      const R = 150;
      cornerWeb(m, m, R, 0, Math.PI / 2);
      cornerWeb(W - m, m, R, Math.PI / 2, Math.PI);
      cornerWeb(W - m, H - m, R, Math.PI, Math.PI * 1.5);
      cornerWeb(m, H - m, R, Math.PI * 1.5, Math.PI * 2);
    } else if (frameStyle === 2) {     // 점선 테두리
      fctx.strokeStyle = 'rgba(255,255,255,0.92)';
      fctx.lineWidth = 7;
      fctx.setLineDash([20, 13]);
      fctx.strokeRect(m, m, W - 2 * m, H - 2 * m);
    } else if (frameStyle === 3) {     // 호박색 두꺼운 테두리
      fctx.strokeStyle = '#ff8a1e';
      fctx.lineWidth = 16;
      fctx.strokeRect(m, m, W - 2 * m, H - 2 * m);
      fctx.strokeStyle = 'rgba(0,0,0,0.35)';
      fctx.lineWidth = 3;
      fctx.strokeRect(m + 10, m + 10, W - 2 * m - 20, H - 2 * m - 20);
    }
    fctx.restore();
  }
  document.querySelectorAll('.frame').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.frame').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      frameStyle = +b.dataset.f;
      drawFrame();
    });
  });

  // ─────────────────────────────────────────────────────────
  // 합성 → 업로드 → QR
  // ─────────────────────────────────────────────────────────
  let lastComposite = null;
  let currentEntryId = null;
  let lastShareUrl = null;   // 마지막으로 업로드된 공유 링크(열기/복사/공유용)

  function composite() {
    const out = document.createElement('canvas');
    out.width = PHOTO_W; out.height = PHOTO_H;
    const c = out.getContext('2d');
    c.drawImage(photoCanvas, 0, 0);
    c.drawImage(doodleCanvas, 0, 0);
    renderOverlay(true);              // 선택 테두리 없이 스티커·글자 렌더
    c.drawImage(overlayCanvas, 0, 0);
    renderOverlay();                  // 화면용(선택 테두리 포함)으로 복원
    c.drawImage(frameCanvas, 0, 0);   // 프레임은 최상단
    return out;
  }

  // 구형 브라우저용 Promise.any 폴리필(먼저 이행되는 하나를 채택, 모두 실패 시 AggregateError 유사 객체)
  const anyOf = (Promise.any
    ? (arr) => Promise.any(arr)
    : (arr) => new Promise((res, rej) => {
        let left = arr.length; const errs = [];
        if (!left) { rej({ errors: errs }); return; }
        arr.forEach((p, i) => Promise.resolve(p).then(res, e => {
          errs[i] = e; if (--left === 0) rej({ errors: errs });
        }));
      }));

  // 무료 이미지 호스트는 자주 멈추므로(응답 없음) 각 시도에 타임아웃을 둔다.
  const UPLOAD_TIMEOUT_MS = 15000;
  // 타임아웃이 없는 Promise(예: Firebase Storage put)에 시간 제한을 건다.
  function withTimeout(promise, ms, label) {
    return new Promise((res, rej) => {
      const timer = setTimeout(() => rej(new Error((label || '작업') + ' 시간 초과')), ms || UPLOAD_TIMEOUT_MS);
      promise.then(v => { clearTimeout(timer); res(v); },
                   e => { clearTimeout(timer); rej(e); });
    });
  }

  // XHR 업로드 — fetch와 달리 업로드 바이트 진행률(upload.onprogress)을 받을 수 있다.
  // onProgress(fraction 0~1) 호출. 응답 본문(text) 반환. 타임아웃/오류 시 reject.
  function xhrUpload(url, fd, onProgress, ms) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', url);
      xhr.timeout = ms || UPLOAD_TIMEOUT_MS;
      if (xhr.upload && onProgress) {
        xhr.upload.onprogress = (e) => { if (e.lengthComputable) onProgress(e.loaded / e.total); };
        xhr.upload.onload = () => onProgress(1);  // 바이트 전송 완료(서버 처리 대기)
      }
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) resolve(xhr.responseText);
        else reject(new Error('HTTP ' + xhr.status));
      };
      xhr.onerror = () => reject(new Error('네트워크 오류'));
      xhr.ontimeout = () => reject(new Error('시간 초과(' + Math.round((ms || UPLOAD_TIMEOUT_MS) / 1000) + '초)'));
      xhr.send(fd);
    });
  }

  // tmpfiles.org 업로드 → { url, expiry } (60분 만료)
  async function uploadTmpfiles(blob, filename, onProgress) {
    const fd = new FormData();
    fd.append('file', blob, filename);
    const text = await xhrUpload(UPLOAD_API, fd, onProgress);
    const json = JSON.parse(text);
    if (json.status !== 'success') throw new Error(json.message || '업로드 실패');
    return { url: json.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/'), expiry: '60분' };
  }

  // catbox.moe 업로드 → { url, expiry:null }
  // 응답이 곧 직접 이미지 URL(https://files.catbox.moe/xxx.jpg)이라
  // 폰에서 인라인으로 열려 "이미지를 길게 눌러 사진에 저장"이 잘 됨 (만료 없음)
  async function uploadCatbox(blob, filename, onProgress) {
    const fd = new FormData();
    fd.append('reqtype', 'fileupload');
    fd.append('fileToUpload', blob, filename);
    const url = (await xhrUpload('https://catbox.moe/user/api.php', fd, onProgress)).trim();
    if (!/^https?:\/\/\S+$/.test(url)) throw new Error(url || '업로드 실패');
    return { url, expiry: null };
  }

  // 공유용 업로드: 폰에서 '사진 저장'이 잘 되는 인라인 이미지 호스트를 우선 사용
  //   1) Firebase Storage(설정 시: 영구·인라인·광고 없음)
  //   2) catbox.moe(무료·영구·인라인 이미지) + tmpfiles.org(60분) 동시 시도 → 먼저 성공한 쪽
  // onProgress(fraction 0~1)로 진행률 보고(병렬 시도 중 가장 앞선 진행률).
  async function uploadForShare(blob, filename, onProgress) {
    const report = onProgress || function () {};
    // 1) Firebase Storage (storageBucket 설정 + 규칙 허용 시에만) — 설정돼 있으면 우선
    try {
      if (GuestbookStore.isStorageReady && GuestbookStore.isStorageReady()) {
        const url = await withTimeout(GuestbookStore.uploadImage(blob, filename), 20000, 'Storage 업로드');
        if (url) { report(1); return { url, expiry: null }; }
      }
    } catch (e) { /* Storage 실패 → 아래 무료 호스트로 폴백 */ }
    // 2) catbox + tmpfiles 동시 시도. 두 진행률 중 큰 값을 화면에 보고
    const frac = [0, 0];
    const mk = (i) => (f) => { frac[i] = f; report(Math.max(frac[0], frac[1])); };
    const attempts = [
      uploadCatbox(blob, filename, mk(0)).catch(e => Promise.reject(new Error('catbox: ' + e.message))),
      uploadTmpfiles(blob, filename, mk(1)).catch(e => Promise.reject(new Error('tmpfiles: ' + e.message))),
    ];
    try {
      const r = await anyOf(attempts);
      report(1);
      return r;
    } catch (agg) {
      const msgs = (agg && agg.errors) ? agg.errors.map(e => e.message).join(' / ') : String(agg);
      throw new Error(msgs || '업로드 실패');
    }
  }

  // Blob → dataURL (같은 인코딩 결과 재사용용)
  function blobToDataURL(blob) {
    return new Promise((res, rej) => {
      const fr = new FileReader();
      fr.onload = () => res(fr.result);
      fr.onerror = () => rej(fr.error);
      fr.readAsDataURL(blob);
    });
  }

  async function send() {
    const out = composite();
    lastComposite = out;

    show('scrSend');
    $('spinner').style.display = 'block';
    $('qrBox').style.display = 'none';
    $('btnRetry').style.display = 'none';
    $('shareRow').style.display = 'none';
    $('sendMsg').innerHTML = '업로드 중...';
    $('urlText').textContent = '';
    clearTimeout(resetTimer);   // 업로드 중에는 자동 복귀 타이머를 멈춰 둠

    // 진행 바 표시 — 멈춤인지 진행 중인지 한눈에 보이도록
    const progWrap = $('progWrap'), progFill = $('progFill'), progText = $('progText');
    progWrap.style.display = 'block';
    progFill.style.width = '0%';
    progText.textContent = '사진 준비 중…';
    const setProg = (frac) => {
      const pct = Math.max(0, Math.min(100, Math.round(frac * 100)));
      progFill.style.width = pct + '%';
      progText.textContent = pct < 100 ? ('업로드 중… ' + pct + '%') : '거의 다 됐어요… 마무리 중';
    };

    const pad = n => String(n).padStart(2, '0');
    const t = new Date();
    const filename = `guestbook_${t.getFullYear()}${pad(t.getMonth() + 1)}${pad(t.getDate())}_${pad(t.getHours())}${pad(t.getMinutes())}${pad(t.getSeconds())}.jpg`;

    try {
      // JPEG 인코딩은 한 번만 — 업로드(blob)와 저장(dataURL)에 같은 결과 재사용
      const blob = await new Promise(r => out.toBlob(r, 'image/jpeg', 0.9));
      // 꾸민(낙서 포함) 최종본을 기록에 저장 (업로드 실패해도 기록은 남음)
      if (currentEntryId) {
        try {
          const dataURL = await blobToDataURL(blob);
          GuestbookStore.update(currentEntryId, { d: dataURL, th: makeThumb(out) });
        } catch (e) {}
      }
      progText.textContent = '업로드 시작…';
      const { url, expiry } = await uploadForShare(blob, filename, setProg);

      // QR 생성
      const qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      $('qrImg').src = qr.createDataURL(8, 8);
      $('spinner').style.display = 'none';
      progWrap.style.display = 'none';
      $('qrBox').style.display = 'block';
      const expiryNote = expiry ? `링크는 ${expiry} 동안 유효합니다 · ` : '';
      $('sendMsg').innerHTML = '📱 다른 기기는 QR 스캔, 이 폰에서는 아래 버튼으로 열기/저장/공유<br><small>' + expiryNote + '열린 사진을 길게 눌러 "사진에 저장"(갤러리)</small>';
      // 공유용 링크/버튼 (특히 이 핸드폰에서 직접 쓸 때) — QR 못 찍어도 바로 열기·복사·공유 가능
      lastShareUrl = url;
      $('btnOpenPhoto').href = url;
      $('shareRow').style.display = 'flex';
      $('btnShare').style.display = (navigator.share ? '' : 'none');
      $('urlText').textContent = url;
      // 성공 시 90초 후 자동으로 처음 화면으로
      resetTimer = setTimeout(goHome, 90000);
    } catch (err) {
      $('spinner').style.display = 'none';
      $('progWrap').style.display = 'none';
      $('btnRetry').style.display = '';
      $('sendMsg').innerHTML = '⚠ 업로드에 실패했습니다<br><small>' + err.message +
        '<br>인터넷 연결을 확인하고 "다시 시도", 또는 "PC에 저장"을 이용하세요</small>';
      // 실패 화면은 자동 복귀하지 않음(사용자가 다시 시도/저장할 수 있도록) — 사진은 이미 기록에 저장됨
    }
  }

  function localSave() {
    if (!lastComposite) return;
    const a = document.createElement('a');
    a.download = 'guestbook.jpg';
    a.href = lastComposite.toDataURL('image/jpeg', 0.92);
    a.click();
  }

  function goHome() {
    clearTimeout(resetTimer);
    stopCamera();
    loadRecent();
    show('scrStart');
  }

  // ─────────────────────────────────────────────────────────
  // 버튼 연결
  // ─────────────────────────────────────────────────────────
  $('btnStart').addEventListener('click', () => { Sfx.prime(); startCamera(); });
  $('btnCamBack').addEventListener('click', goHome);

  // 효과음 / 배경음악 토글
  $('btnSfx').classList.toggle('on', Sfx.isOn());
  $('btnSfx').textContent = Sfx.isOn() ? '🔊 효과음' : '🔇 효과음';
  $('btnSfx').addEventListener('click', () => {
    Sfx.prime();                       // 사용자 제스처에서 오디오 활성화
    const on = Sfx.toggle();
    $('btnSfx').classList.toggle('on', on);
    $('btnSfx').textContent = on ? '🔊 효과음' : '🔇 효과음';
    Sfx.demo(on);                      // 누를 때마다 항상 소리(켬=셔터음 / 끔=신호음)
  });
  $('btnBgm').addEventListener('click', () => {
    Sfx.prime();
    const r = Bgm.toggle();
    if (r === 'nosrc') { $('bgmFile').click(); return; }  // 음원 없음 → 파일 선택창
    $('btnBgm').classList.toggle('on', r === true);
  });

  // 배경음악 / 효과음 파일 직접 불러오기 (세션 동안 사용 — 새로고침 시 재선택)
  $('btnLoadBgm').addEventListener('click', () => { Sfx.prime(); $('bgmFile').click(); });
  $('bgmFile').addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    Bgm.setSrc(URL.createObjectURL(f));
    $('btnBgm').classList.add('on');
    $('btnLoadBgm').textContent = '📂 ' + (f.name.length > 12 ? f.name.slice(0, 11) + '…' : f.name);
    e.target.value = '';
  });
  $('btnLoadSfx').addEventListener('click', () => { Sfx.prime(); $('sfxFile').click(); });
  $('sfxFile').addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    Sfx.setShutter(URL.createObjectURL(f));
    $('btnSfx').classList.add('on');
    $('btnSfx').textContent = '🔊 효과음';
    $('btnLoadSfx').textContent = '📂 ' + (f.name.length > 12 ? f.name.slice(0, 11) + '…' : f.name);
    e.target.value = '';
  });

  // 거미줄 펜 굵기 프리셋
  document.querySelectorAll('.penpreset').forEach(b => {
    b.addEventListener('click', () => {
      pen.width = +b.dataset.w;
      $('penW').value = pen.width;
    });
  });
  // 🎨 꾸미기: 펜·스티커·프레임 도구 패널 펼침/접기 (주기능은 보내기)
  $('btnDecorate').addEventListener('click', () => {
    const open = $('decoratePanel').classList.contains('closed');
    $('decoratePanel').classList.toggle('closed', !open);
    $('btnDecorate').classList.toggle('on', open);
  });

  $('btnShoot').addEventListener('click', shoot);
  $('btnFlip').addEventListener('click', flipCamera);
  $('btnRetake').addEventListener('click', startCamera);
  $('btnSend').addEventListener('click', send);
  $('btnRetry').addEventListener('click', send);
  $('btnLocalSave').addEventListener('click', localSave);
  $('btnDone').addEventListener('click', goHome);

  // 링크 복사 — 손님이 다른 사람에게 주소를 전달할 때
  $('btnCopyLink').addEventListener('click', async () => {
    if (!lastShareUrl) return;
    let ok = false;
    try { await navigator.clipboard.writeText(lastShareUrl); ok = true; }
    catch (e) {
      // clipboard API 미지원/거부 시 임시 입력창으로 폴백
      try {
        const ta = document.createElement('textarea');
        ta.value = lastShareUrl; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        ok = document.execCommand('copy');
        document.body.removeChild(ta);
      } catch (e2) {}
    }
    const b = $('btnCopyLink'), prev = b.textContent;
    b.textContent = ok ? '✓ 복사됨' : '✗ 복사 실패';
    setTimeout(() => { b.textContent = prev; }, 1500);
  });

  // 공유하기 — 카카오톡·메시지 등으로 링크 바로 전송 (navigator.share 지원 기기에서만)
  $('btnShare').addEventListener('click', async () => {
    if (!lastShareUrl || !navigator.share) return;
    try { await navigator.share({ title: '포토 방명록', text: '포토 방명록 사진', url: lastShareUrl }); }
    catch (e) { /* 사용자가 공유 취소 — 무시 */ }
  });

})();
</script>
