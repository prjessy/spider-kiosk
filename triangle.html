<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>삼각형 모자익</title>
<script src="qrcode.min.js"></script>
<script>
  // 로컬 qrcode.min.js가 없으면 CDN에서 로드
  if (typeof qrcode === 'undefined') {
    document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"><\/script>');
  }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #2b2b2b;
    color: #eee;
    overflow: hidden;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  @supports (height: 100dvh) {
    html, body { height: 100dvh; }
  }

  #stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #canvasWrap { position: relative; line-height: 0; }

  canvas#c {
    background: #1a1a1a;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    cursor: crosshair;
    touch-action: none;
    display: block;
  }

  /* ── 비교 슬라이더(원본↔변환) ── */
  #cmp {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: none; pointer-events: none;
  }
  #compareBar {
    position: absolute; top: 0; bottom: 0;
    width: 2px; left: 50%;
    background: #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
    display: none; pointer-events: none; z-index: 6;
  }
  #compareKnob {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px; border-radius: 50%;
    background: #fff; color: #222;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  #compareHit {
    position: absolute; inset: 0;
    display: none; cursor: ew-resize; z-index: 5;
    touch-action: none;
  }
  .cmpLabel {
    position: absolute; top: 10px;
    font-size: 12px; color: #fff;
    background: rgba(0,0,0,0.5); padding: 3px 9px; border-radius: 20px;
    display: none; pointer-events: none; z-index: 7; line-height: 1.4;
  }
  #cmpLabelL { left: 10px; }
  #cmpLabelR { right: 10px; }

  /* ── 툴바 ── */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 4px; flex-wrap: nowrap; overflow-x: auto;
    padding: 6px 10px;
    background: rgba(34, 34, 34, 0.92);
    backdrop-filter: blur(6px);
    color: #ddd; font-size: 12px; z-index: 100;
    transition: transform 0.25s ease;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  #toolbar.hidden { transform: translateY(-100%); }

  #optionsPanel {
    position: fixed; left: 0; right: 0; z-index: 98;
    display: flex; flex-direction: column; gap: 10px;
    padding: 12px 14px;
    background: rgba(28, 28, 28, 0.97);
    backdrop-filter: blur(6px);
    color: #ddd; font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 6px 20px rgba(0,0,0,0.45);
  }
  #optionsPanel.closed { display: none; }
  .opt-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  #btnOptions.on { background: #ef9a5b; border-color: #ef9a5b; color: #fff; }

  .group {
    display: flex; align-items: center; gap: 4px;
    padding: 0 8px; border-right: 1px solid rgba(255,255,255,0.15);
  }
  .group:last-child { border-right: none; margin-left: auto; }

  button {
    display: inline-flex; align-items: center; gap: 5px;
    background: #3d3d3d; border: 1px solid #555; color: #eee;
    border-radius: 5px; padding: 5px 10px;
    font-size: 12px; font-family: inherit; cursor: pointer; white-space: nowrap;
  }
  button .ic { font-size: 13px; line-height: 1; }
  button:hover { background: #4d4d4d; }
  button:active { background: #5a5a5a; }
  button:disabled { opacity: 0.35; cursor: default; }
  button.on { background: #ef9a5b; border-color: #ef9a5b; color: #fff; }

  label { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  input[type="range"] { width: 70px; accent-color: #f0b27a; touch-action: none; }
  #brushR, #cellS, #jitter, #detail { width: 200px; height: 26px; }
  .val { width: 38px; text-align: right; color: #f0b27a; font-variant-numeric: tabular-nums; }
  .seg { display: inline-flex; gap: 4px; }
  .seg button.on { background: #ef9a5b; border-color: #ef9a5b; color: #fff; }
  .seg.disabled { opacity: 0.35; pointer-events: none; }

  #showTab {
    position: fixed; top: 0; left: 50%;
    transform: translateX(-50%);
    background: rgba(34,34,34,0.85); color: #aaa;
    font-size: 11px; padding: 3px 18px;
    border-radius: 0 0 8px 8px; cursor: pointer; z-index: 99; display: none;
  }
  #toolbar.hidden ~ #showTab { display: block; }

  #cursor {
    position: fixed; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.7);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
    pointer-events: none; transform: translate(-50%, -50%);
    z-index: 90; display: none;
  }
  #cursor.erase { border-color: #ff7a7a; border-style: dashed; }

  #hint {
    position: fixed; bottom: 18px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px; letter-spacing: 0.15em;
    color: rgba(255,255,255,0.5);
    pointer-events: none; z-index: 50; text-align: center;
  }

  input[type="file"] { display: none; }

  /* ── 카메라 / 전송 오버레이 ── */
  .overlay {
    position: fixed; inset: 0; z-index: 200; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; background: #16161d; padding: 16px;
  }
  .overlay.active { display: flex; }
  .overlay video {
    width: min(92vw, 900px); aspect-ratio: 16 / 9;
    object-fit: cover; border-radius: 14px; background: #000;
  }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 94vw; }
  .ctrl {
    background: #2e2e3a; border: 1px solid #4a4a5a; color: #eee;
    font-size: 17px; font-family: inherit;
    padding: 13px 28px; border-radius: 12px; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ctrl:active { background: #44445a; }
  .ctrl.primary { background: #ef9a5b; border-color: #ef9a5b; color: #1a1a1a; font-weight: bold; }
  #camError { color: #e88; max-width: 90vw; text-align: center; display: none; font-size: 14px; }

  #qrBox { background: #fff; padding: 22px; border-radius: 18px; display: none; }
  #qrBox img { display: block; width: 300px; height: 300px; image-rendering: pixelated; }
  #spinner {
    width: 56px; height: 56px;
    border: 5px solid #333; border-top-color: #ef9a5b;
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #sendMsg { font-size: 18px; text-align: center; line-height: 1.6; max-width: 90vw; }
  #sendMsg small { color: #889; font-size: 13px; }
  #urlText { font-size: 12px; color: #667; word-break: break-all; max-width: 70vw; text-align: center; }

  @media (max-width: 760px) {
    #toolbar { gap: 3px; padding: 6px 6px; }
    #toolbar button .lbl { display: none; }
    #toolbar button { padding: 7px 9px; }
    .group { padding: 0 5px; gap: 3px; }
    .group:last-child { margin-left: 0; }
    #brushR, #cellS, #jitter, #detail { width: 160px; }
    input[type="range"] { width: 130px; }
  }
</style>
</head>
<body>

<div id="stage">
  <div id="canvasWrap">
    <canvas id="c"></canvas>
    <canvas id="cmp"></canvas>
    <div id="compareHit"></div>
    <div id="compareBar"><div id="compareKnob">↔</div></div>
    <div class="cmpLabel" id="cmpLabelL">원본</div>
    <div class="cmpLabel" id="cmpLabelR">변환</div>
  </div>
</div>

<!-- 상단 툴바 -->
<div id="toolbar">
  <div class="group">
    <button id="btnCam" title="카메라로 촬영"><span class="ic">📷</span><span class="lbl">카메라</span></button>
    <button id="btnOpen" title="이미지 열기 (Ctrl+O)"><span class="ic">🖼</span><span class="lbl">이미지 열기</span></button>
    <button id="btnSave" title="PNG로 저장 (Ctrl+S)"><span class="ic">💾</span><span class="lbl">저장</span></button>
    <button id="btnSend" title="QR로 핸드폰에 전송"><span class="ic">📱</span><span class="lbl">보내기</span></button>
  </div>
  <div class="group">
    <button id="btnAll" title="사진 전체를 변환(애니메이션)"><span class="ic">🔺</span><span class="lbl">전체 변환</span></button>
    <button id="btnCompare" title="원본과 변환 결과를 좌우로 비교"><span class="ic">↔</span><span class="lbl">비교</span></button>
    <button id="btnErase" title="문지른 부분만 원본 사진으로 되돌리기"><span class="ic">🧽</span><span class="lbl">원본 브러시</span></button>
    <button id="btnReset" title="전체를 원본 사진으로 되돌리기"><span class="ic">↺</span><span class="lbl">원본</span></button>
  </div>
  <div class="group">
    <button id="btnUndo" title="실행취소 (Ctrl+Z)"><span class="ic">↶</span><span class="lbl">실행취소</span></button>
    <button id="btnRedo" title="재실행 (Ctrl+Y)"><span class="ic">↷</span><span class="lbl">재실행</span></button>
  </div>
  <div class="group">
    <button id="btnOptions" title="모양·크기·스타일 옵션"><span class="ic">⚙</span><span class="lbl">옵션</span></button>
    <button id="btnClose" title="닫기"><span class="ic">✕</span><span class="lbl">닫기</span></button>
  </div>
</div>

<!-- 옵션 패널 -->
<div id="optionsPanel" class="closed">
  <div class="opt-row tools">
    <button id="btnFull" title="전체화면"><span class="ic">⛶</span><span class="lbl">전체화면</span></button>
    <button id="btnHide" title="툴바 숨기기"><span class="ic">▲</span><span class="lbl">툴바 숨기기</span></button>
  </div>
  <div class="opt-row">
    <span style="opacity:.7">모양:</span>
    <span class="seg" id="shapeSeg">
      <button data-shape="t" class="on">🔺 삼각형</button>
      <button data-shape="s">⬛ 사각형</button>
      <button data-shape="h">⬡ 육각형</button>
      <button data-shape="d">⚫ 점</button>
    </span>
    <button id="btnAdaptive" title="색이 단조로운 곳은 큰 삼각형, 디테일한 곳은 작은 삼각형으로 (로우폴리)">🔻 적응형</button>
  </div>
  <div class="opt-row">
    <label>변환 영역 크기 <input type="range" id="brushR" min="15" max="400" step="5" value="50"><span class="val" id="brushRVal">50</span></label>
    <label><span id="cellLabelText">모자익 크기</span> <input type="range" id="cellS" min="12" max="140" step="2" value="46"><span class="val" id="cellSVal">46</span></label>
    <label id="jitterWrap">불규칙도 <input type="range" id="jitter" min="0" max="0.9" step="0.05" value="0.45"><span class="val" id="jitterVal">0.45</span></label>
    <label id="detailWrap" style="display:none">디테일 민감도 <input type="range" id="detail" min="1" max="10" step="1" value="5"><span class="val" id="detailVal">5</span></label>
  </div>
  <div class="opt-row">
    <span style="opacity:.7">스타일:</span>
    <span class="seg" id="styleSeg">
      <button data-style="fill" class="on">채움</button>
      <button data-style="edge">테두리</button>
      <button data-style="wire">와이어</button>
      <button data-style="gray">흑백</button>
    </span>
    <button id="btnAnim" class="on" title="전체 변환 시 퍼지는 애니메이션">✨ 애니메이션</button>
  </div>
</div>

<div id="showTab">▼ 메뉴</div>

<div id="cursor"></div>
<div id="hint">사진을 클릭하거나 드래그하면 삼각형으로 변환돼요</div>
<input type="file" id="fileInput" accept="image/*">

<!-- 카메라 오버레이 -->
<div class="overlay" id="ovCam">
  <video id="video" autoplay playsinline muted></video>
  <p id="camError"></p>
  <div class="row">
    <button class="ctrl" id="btnCamCancel">← 취소</button>
    <button class="ctrl primary" id="btnShoot" style="font-size:20px; padding:15px 48px">📷 촬영</button>
    <button class="ctrl" id="btnFlip">🔄 카메라 전환</button>
  </div>
</div>

<!-- 전송/QR 오버레이 -->
<div class="overlay" id="ovSend">
  <div id="spinner"></div>
  <div id="qrBox"><img id="qrImg" alt="QR"></div>
  <div id="sendMsg">업로드 중...</div>
  <div class="row" id="shareRow" style="display:none">
    <a class="ctrl primary" id="btnOpenPhoto" target="_blank" rel="noopener">📷 사진 열기</a>
    <button class="ctrl" id="btnShare" style="display:none">↗ 공유하기</button>
    <button class="ctrl" id="btnCopyLink">📋 링크 복사</button>
  </div>
  <div id="urlText"></div>
  <div class="row">
    <button class="ctrl" id="btnRetry" style="display:none">🔄 다시 시도</button>
    <button class="ctrl primary" id="btnSendClose">✓ 돌아가기</button>
  </div>
</div>

<script>
(() => {
  'use strict';

  const MAX_DIM = 1920;
  let W = 1280, H = 800;

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const src = document.createElement('canvas');           // 원본 사진(샘플링·되돌리기용)
  const sctx = src.getContext('2d', { willReadFrequently: true });
  let srcData = null;

  const cmp = document.getElementById('cmp');             // 비교용 원본 표시 캔버스
  const cmpctx = cmp.getContext('2d');

  const cursor = document.getElementById('cursor');
  const toolbar = document.getElementById('toolbar');
  const optionsPanel = document.getElementById('optionsPanel');
  const $ = id => document.getElementById(id);

  const SQRT3 = Math.sqrt(3);

  // ── 설정값 ────────────────────────────────────────────────
  const cfg = {
    shape: 't',       // t=삼각형 s=사각형 h=육각형 d=점
    brushR: 50,       // 변환 영역 크기(반경, px)
    cellS: 46,        // 모자익 셀 크기(px)
    jitter: 0.45,     // 격자 꼭짓점 흔들림
    style: 'fill',    // fill | edge | wire | gray
    erase: false,     // 원본 브러시(부분 되돌리기)
    animate: true,    // 전체 변환 애니메이션
    adaptive: false,  // 적응형(로우폴리): 단조로운 곳 큰 삼각형, 디테일 작은 삼각형
    detailSens: 5,    // 디테일 민감도(1~10): 클수록 작은 삼각형 많아짐
  };

  // ── 상태 ──────────────────────────────────────────────────
  let isDrawing = false;
  let dirty = false;
  let hasImage = false;
  const painted = new Set();     // 변환된 타일 키 "shape:i,j"

  const K = (sh, i, j) => sh + ':' + i + ',' + j;
  function parseKey(key) {
    const c = key.indexOf(':'), rest = key.slice(c + 1), m = rest.indexOf(',');
    return { sh: key.slice(0, c), i: +rest.slice(0, m), j: +rest.slice(m + 1) };
  }

  // ── Undo / Redo ───────────────────────────────────────────
  const undoStack = [], redoStack = [];
  const MAX_HISTORY = 20;
  function snapshot() {
    undoStack.push({ img: ctx.getImageData(0, 0, W, H), cells: new Set(painted) });
    if (undoStack.length > MAX_HISTORY) undoStack.shift();
    redoStack.length = 0;
    updateHistoryButtons();
  }
  function restoreState(s) {
    ctx.putImageData(s.img, 0, 0);
    painted.clear();
    s.cells.forEach(k => painted.add(k));
  }
  function undo() {
    if (!undoStack.length) return;
    redoStack.push({ img: ctx.getImageData(0, 0, W, H), cells: new Set(painted) });
    restoreState(undoStack.pop());
    updateHistoryButtons();
  }
  function redo() {
    if (!redoStack.length) return;
    undoStack.push({ img: ctx.getImageData(0, 0, W, H), cells: new Set(painted) });
    restoreState(redoStack.pop());
    updateHistoryButtons();
  }
  function updateHistoryButtons() {
    $('btnUndo').disabled = !undoStack.length;
    $('btnRedo').disabled = !redoStack.length;
  }
  function resetHistory() { undoStack.length = 0; redoStack.length = 0; updateHistoryButtons(); }

  // ── 격자 꼭짓점 해시(결정적) — 인접 셀이 꼭짓점 공유 → 이음새 없음 ──
  function hash(i, j) {
    let h = (i * 73856093) ^ (j * 19349663);
    h = Math.imul(h ^ (h >>> 13), 1274126177);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }
  function vert(i, j) {
    const cs = cfg.cellS, jit = cfg.jitter;
    let x = i * cs + (hash(i, j) - 0.5) * cs * jit;
    let y = j * cs + (hash(i + 99991, j + 12347) - 0.5) * cs * jit;
    if (x < 0) x = 0; else if (x > W) x = W;
    if (y < 0) y = 0; else if (y > H) y = H;
    return [x, y];
  }

  function sampleColor(x, y) {
    if (!srcData) return [128, 128, 128];
    let ix = x | 0, iy = y | 0;
    if (ix < 0) ix = 0; else if (ix >= W) ix = W - 1;
    if (iy < 0) iy = 0; else if (iy >= H) iy = H - 1;
    const k = (iy * W + ix) * 4;
    return [srcData[k], srcData[k + 1], srcData[k + 2]];
  }

  // 다각형 채우기(스타일 적용). 색은 도형 무게중심에서 샘플링
  function fillPoly(pts) {
    let cx = 0, cy = 0;
    for (const p of pts) { cx += p[0]; cy += p[1]; }
    cx /= pts.length; cy /= pts.length;
    let col = sampleColor(cx, cy);
    let r = col[0], g = col[1], bl = col[2];
    if (cfg.style === 'gray') { const y = (r * 0.299 + g * 0.587 + bl * 0.114) | 0; r = g = bl = y; }
    const s = `rgb(${r},${g},${bl})`;
    ctx.beginPath();
    pts.forEach((p, k) => k ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1]));
    ctx.closePath();
    ctx.lineJoin = 'round';
    if (cfg.style === 'wire') {
      ctx.fillStyle = '#141414'; ctx.fill();
      ctx.strokeStyle = s; ctx.lineWidth = 1.3; ctx.stroke();
    } else {
      ctx.fillStyle = s; ctx.fill();
      ctx.strokeStyle = (cfg.style === 'edge') ? 'rgba(0,0,0,0.4)' : s;
      ctx.lineWidth = 1; ctx.stroke();
    }
  }

  // 타일 중심 좌표 (브러시 거리 판정·애니메이션 정렬용)
  function tileCenter(sh, i, j) {
    const cs = cfg.cellS;
    if (sh === 'h') {
      const R = cs;
      return [1.5 * R * i, SQRT3 * R * (j + ((i & 1) ? 0.5 : 0))];
    }
    return [(i + 0.5) * cs, (j + 0.5) * cs];
  }

  // 타일 한 개 그리기
  function drawTile(sh, i, j) {
    const cs = cfg.cellS;
    if (sh === 't') {
      const A = vert(i, j), B = vert(i + 1, j), C = vert(i, j + 1), D = vert(i + 1, j + 1);
      if ((i + j) & 1) { fillPoly([A, B, D]); fillPoly([A, D, C]); }
      else { fillPoly([A, B, C]); fillPoly([B, D, C]); }
    } else if (sh === 's') {
      fillPoly([vert(i, j), vert(i + 1, j), vert(i + 1, j + 1), vert(i, j + 1)]);
    } else if (sh === 'h') {
      const R = cs, c = tileCenter('h', i, j), pts = [];
      for (let k = 0; k < 6; k++) {
        const a = Math.PI / 3 * k;
        pts.push([c[0] + R * Math.cos(a), c[1] + R * Math.sin(a)]);
      }
      fillPoly(pts);
    } else if (sh === 'd') {            // 점(원형) — 어두운 그라우트 + 색 원
      const cx = (i + 0.5) * cs, cy = (j + 0.5) * cs;
      let col = sampleColor(cx, cy);
      let r = col[0], g = col[1], bl = col[2];
      if (cfg.style === 'gray') { const y = (r * 0.299 + g * 0.587 + bl * 0.114) | 0; r = g = bl = y; }
      ctx.fillStyle = `rgb(${(r * 0.28) | 0},${(g * 0.28) | 0},${(bl * 0.28) | 0})`;
      ctx.fillRect(i * cs, j * cs, cs, cs);
      ctx.beginPath();
      ctx.arc(cx, cy, cs * 0.46, 0, Math.PI * 2);
      ctx.fillStyle = `rgb(${r},${g},${bl})`;
      ctx.fill();
    }
  }
  function drawTileKey(key) {
    if (key.charCodeAt(0) === 112) { drawTri(+key.slice(2)); return; }  // 'p:' = 로우폴리 삼각형
    const t = parseKey(key); drawTile(t.sh, t.i, t.j);
  }

  // 변환된 타일 전부 다시 그림(스타일 변경 시) — 각 타일은 저장된 모양 그대로
  function reRenderAll() {
    if (!hasImage) return;
    ctx.drawImage(src, 0, 0);
    painted.forEach(drawTileKey);
  }

  // ── 적응형(로우폴리) 삼각형 ───────────────────────────────
  // 색이 단조로운 곳은 큰 삼각형, 에지(디테일) 많은 곳은 작은 삼각형.
  // 1) 그래디언트(에지) 계산 → 2) 에지 많은 곳에 점 조밀 배치 → 3) 들로네 삼각분할
  let triList = [];            // [{ pts:[[x,y]×3], cx, cy }]
  let triBuckets = null;       // "bx,by" -> [삼각형 인덱스]
  let gradMap = null;          // Float32Array — 정규화된 에지 강도(0~1)
  const TRI_BUCKET = 48;

  function buildGradient() {
    gradMap = new Float32Array(W * H);
    if (!srcData) return;
    const lum = new Float32Array(W * H);
    for (let p = 0, q = 0; p < W * H; p++, q += 4)
      lum[p] = srcData[q] * 0.299 + srcData[q + 1] * 0.587 + srcData[q + 2] * 0.114;
    const NORM = 1 / 1442;     // Sobel 최대 크기 ≈ √2·4·255
    for (let y = 1; y < H - 1; y++) {
      for (let x = 1; x < W - 1; x++) {
        const k = y * W + x;
        const tl = lum[k - W - 1], tc = lum[k - W], tr = lum[k - W + 1];
        const ml = lum[k - 1],                      mr = lum[k + 1];
        const bl = lum[k + W - 1], bc = lum[k + W], br = lum[k + W + 1];
        const gx = (tr + 2 * mr + br) - (tl + 2 * ml + bl);
        const gy = (bl + 2 * bc + br) - (tl + 2 * tc + tr);
        gradMap[k] = Math.sqrt(gx * gx + gy * gy) * NORM;
      }
    }
  }
  function gradAt(x, y) {
    let ix = x | 0, iy = y | 0;
    if (ix < 0) ix = 0; else if (ix >= W) ix = W - 1;
    if (iy < 0) iy = 0; else if (iy >= H) iy = H - 1;
    return gradMap[iy * W + ix];
  }
  function maxGradCell(x, y, step) {        // 셀 영역 내 최대 에지 강도
    const h = step / 2, s = Math.max(2, step / 3);
    let m = 0;
    for (let yy = y - h; yy <= y + h; yy += s)
      for (let xx = x - h; xx <= x + h; xx += s) { const g = gradAt(xx, yy); if (g > m) m = g; }
    return m;
  }

  function buildLowPoly() {
    triList = []; triBuckets = null;
    if (!srcData) return;
    buildGradient();
    const base = Math.max(14, cfg.cellS);   // 단조로운 영역의 삼각형 크기
    const sens = cfg.detailSens;            // 1~10
    const thr1 = Math.max(0.04, 0.22 - sens * 0.016);
    const thr2 = thr1 * 1.7;
    const CAP = 5000;

    const pts = [];
    const seen = new Set();
    const addPt = (x, y) => {
      if (pts.length >= CAP) return;
      x = x < 0 ? 0 : (x > W ? W : x);
      y = y < 0 ? 0 : (y > H ? H : y);
      const key = (x | 0) + ',' + (y | 0);
      if (seen.has(key)) return;
      seen.add(key); pts.push([x, y]);
    };
    // 모서리 + 테두리(직사각형 전체가 삼각형으로 덮이도록)
    addPt(0, 0); addPt(W, 0); addPt(0, H); addPt(W, H);
    for (let x = base; x < W; x += base) {
      addPt(x + (hash(x, 1) - 0.5) * base * 0.4, 0);
      addPt(x + (hash(x, 2) - 0.5) * base * 0.4, H);
    }
    for (let y = base; y < H; y += base) {
      addPt(0, y + (hash(1, y) - 0.5) * base * 0.4);
      addPt(W, y + (hash(2, y) - 0.5) * base * 0.4);
    }
    // 내부 기본 격자(단조로운 영역 → 큰 삼각형)
    for (let y = base; y < H; y += base)
      for (let x = base; x < W; x += base)
        addPt(x + (hash(x, y) - 0.5) * base * 0.45, y + (hash(x + 7, y + 3) - 0.5) * base * 0.45);
    // 디테일 레벨(에지 강한 곳 → 점 추가 → 작은 삼각형)
    const levels = [{ step: base / 2, thr: thr1 }, { step: Math.max(7, base / 4), thr: thr2 }];
    for (const lv of levels) {
      const st = lv.step;
      let stop = false;
      for (let y = st; y < H && !stop; y += st)
        for (let x = st; x < W; x += st) {
          if (pts.length >= CAP) { stop = true; break; }
          if (maxGradCell(x, y, st) > lv.thr)
            addPt(x + (hash(x * 3, y) - 0.5) * st * 0.5, y + (hash(x, y * 3) - 0.5) * st * 0.5);
        }
    }

    const tris = triangulate(pts);
    triList = new Array(tris.length);
    triBuckets = new Map();
    const G = TRI_BUCKET;
    for (let t = 0; t < tris.length; t++) {
      const A = pts[tris[t][0]], B = pts[tris[t][1]], C = pts[tris[t][2]];
      const cx = (A[0] + B[0] + C[0]) / 3, cy = (A[1] + B[1] + C[1]) / 3;
      triList[t] = { pts: [A, B, C], cx, cy };
      const bk = Math.floor(cx / G) + ',' + Math.floor(cy / G);
      let arr = triBuckets.get(bk); if (!arr) { arr = []; triBuckets.set(bk, arr); } arr.push(t);
    }
  }
  function ensureLowPoly() { if (cfg.adaptive && !triList.length && srcData) buildLowPoly(); }
  function drawTri(idx) { const t = triList[idx]; if (t) fillPoly(t.pts); }

  // 들로네 삼각분할 (Bowyer–Watson)
  function triangulate(inPts) {
    const n = inPts.length;
    if (n < 3) return [];
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of inPts) {
      if (p[0] < minX) minX = p[0]; if (p[1] < minY) minY = p[1];
      if (p[0] > maxX) maxX = p[0]; if (p[1] > maxY) maxY = p[1];
    }
    const dmax = Math.max(maxX - minX, maxY - minY) || 1;
    const mx = (minX + maxX) / 2, my = (minY + maxY) / 2;
    const P = inPts.slice();
    const s = P.length;        // 슈퍼 삼각형 꼭짓점 시작 인덱스
    P.push([mx - 20 * dmax, my - dmax], [mx, my + 20 * dmax], [mx + 20 * dmax, my - dmax]);
    let tris = [mkTri(P, s, s + 1, s + 2)];
    for (let ip = 0; ip < n; ip++) {
      const px = P[ip][0], py = P[ip][1];
      const edges = [];        // 평탄화된 [a,b, a,b, ...]
      for (let t = tris.length - 1; t >= 0; t--) {
        const tr = tris[t], ddx = px - tr.cx, ddy = py - tr.cy;
        if (ddx * ddx + ddy * ddy < tr.r2) {     // 외접원 안 → 제거하고 에지 수집
          edges.push(tr.a, tr.b, tr.b, tr.c, tr.c, tr.a);
          tris[t] = tris[tris.length - 1]; tris.pop();
        }
      }
      const m = edges.length / 2;
      for (let i = 0; i < m; i++) {               // 두 번 나온 에지(내부) 제거 → 경계만
        if (edges[i * 2] === -1) continue;
        for (let j = i + 1; j < m; j++) {
          if (edges[j * 2] === -1) continue;
          if ((edges[i * 2] === edges[j * 2] && edges[i * 2 + 1] === edges[j * 2 + 1]) ||
              (edges[i * 2] === edges[j * 2 + 1] && edges[i * 2 + 1] === edges[j * 2])) {
            edges[i * 2] = -1; edges[j * 2] = -1; break;
          }
        }
      }
      for (let i = 0; i < m; i++)
        if (edges[i * 2] !== -1) tris.push(mkTri(P, edges[i * 2], edges[i * 2 + 1], ip));
    }
    const out = [];
    for (const tr of tris) if (tr.a < s && tr.b < s && tr.c < s) out.push([tr.a, tr.b, tr.c]);
    return out;
  }
  function mkTri(P, a, b, c) {
    const ax = P[a][0], ay = P[a][1], bx = P[b][0], by = P[b][1], cx = P[c][0], cy = P[c][1];
    const d = 2 * (ax * (by - cy) + bx * (cy - ay) + cx * (ay - by));
    let ux, uy;
    if (Math.abs(d) < 1e-9) { ux = (ax + bx + cx) / 3; uy = (ay + by + cy) / 3; }
    else {
      const a2 = ax * ax + ay * ay, b2 = bx * bx + by * by, c2 = cx * cx + cy * cy;
      ux = (a2 * (by - cy) + b2 * (cy - ay) + c2 * (ay - by)) / d;
      uy = (a2 * (cx - bx) + b2 * (ax - cx) + c2 * (bx - ax)) / d;
    }
    const r2 = (ax - ux) * (ax - ux) + (ay - uy) * (ay - uy);
    return { a, b, c, cx: ux, cy: uy, r2 };
  }

  // ── 변환 / 되돌리기 ───────────────────────────────────────
  function paintAt(x, y) {
    if (!hasImage) return;
    if (cfg.erase) { eraseAt(x, y); return; }
    if (cfg.adaptive) { paintPolyAt(x, y); return; }
    const sh = cfg.shape, cs = cfg.cellS, r = cfg.brushR, r2 = r * r;
    let i0, i1, j0, j1;
    if (sh === 'h') {
      const hx = 1.5 * cs, hy = SQRT3 * cs;
      i0 = Math.floor((x - r) / hx) - 1; i1 = Math.floor((x + r) / hx) + 1;
      j0 = Math.floor((y - r) / hy) - 1; j1 = Math.floor((y + r) / hy) + 1;
    } else {
      i0 = Math.floor((x - r) / cs); i1 = Math.floor((x + r) / cs);
      j0 = Math.floor((y - r) / cs); j1 = Math.floor((y + r) / cs);
      if (i0 < 0) i0 = 0; if (j0 < 0) j0 = 0;
    }
    for (let i = i0; i <= i1; i++)
      for (let j = j0; j <= j1; j++) {
        const c = tileCenter(sh, i, j);
        const dx = c[0] - x, dy = c[1] - y;
        if (dx * dx + dy * dy > r2) continue;
        const key = K(sh, i, j);
        if (painted.has(key)) continue;
        painted.add(key);
        drawTile(sh, i, j);
        dirty = true;
      }
  }

  // 적응형 브러시: 중심이 브러시 안에 든 로우폴리 삼각형을 변환
  function paintPolyAt(x, y) {
    ensureLowPoly();
    if (!triBuckets) return;
    const r = cfg.brushR, r2 = r * r, G = TRI_BUCKET;
    const bx0 = Math.floor((x - r) / G), bx1 = Math.floor((x + r) / G);
    const by0 = Math.floor((y - r) / G), by1 = Math.floor((y + r) / G);
    for (let bx = bx0; bx <= bx1; bx++)
      for (let by = by0; by <= by1; by++) {
        const arr = triBuckets.get(bx + ',' + by);
        if (!arr) continue;
        for (const idx of arr) {
          const t = triList[idx], dx = t.cx - x, dy = t.cy - y;
          if (dx * dx + dy * dy > r2) continue;
          const key = 'p:' + idx;
          if (painted.has(key)) continue;
          painted.add(key); drawTri(idx); dirty = true;
        }
      }
  }

  // 키 중심이 브러시 원 안에 드는지 (격자·로우폴리 모두 지원)
  function keyHit(key, x, y, r2) {
    if (key.charCodeAt(0) === 112) {                 // 'p:' = 로우폴리
      const t = triList[+key.slice(2)]; if (!t) return false;
      const dx = t.cx - x, dy = t.cy - y; return dx * dx + dy * dy <= r2;
    }
    const t = parseKey(key), c = tileCenter(t.sh, t.i, t.j);
    const dx = c[0] - x, dy = c[1] - y; return dx * dx + dy * dy <= r2;
  }

  // 원본 브러시: 원형 영역을 원본으로 복원 + 그 안 타일은 변환목록에서 제거
  function eraseAt(x, y) {
    const r = cfg.brushR, r2 = r * r;
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(src, 0, 0);
    ctx.restore();
    painted.forEach(key => { if (keyHit(key, x, y, r2)) painted.delete(key); });
    dirty = true;
  }

  // 현재 모양으로 캔버스 전체 타일 열거
  function enumerateAll(sh) {
    const cs = cfg.cellS, out = [];
    if (sh === 'h') {
      const hx = 1.5 * cs, hy = SQRT3 * cs;
      const iN = Math.ceil(W / hx) + 1, jN = Math.ceil(H / hy) + 1;
      for (let i = -1; i <= iN; i++)
        for (let j = -1; j <= jN; j++) { const c = tileCenter('h', i, j); out.push({ i, j, cx: c[0], cy: c[1] }); }
    } else {
      const iN = Math.ceil(W / cs), jN = Math.ceil(H / cs);
      for (let i = 0; i < iN; i++)
        for (let j = 0; j < jN; j++) out.push({ i, j, cx: (i + 0.5) * cs, cy: (j + 0.5) * cs });
    }
    return out;
  }

  // 전체 변환 (애니메이션: 중앙→바깥)
  let animRunning = false;
  function paintAll() {
    if (!hasImage || animRunning) return;
    const cx = W / 2, cy = H / 2;
    let cells, drawFn;
    if (cfg.adaptive) {
      ensureLowPoly();
      cells = [];
      for (let idx = 0; idx < triList.length; idx++) {
        const key = 'p:' + idx;
        if (painted.has(key)) continue;
        const t = triList[idx];
        cells.push({ key, draw: idx, cx: t.cx, cy: t.cy });
      }
      drawFn = c => drawTri(c.draw);
    } else {
      const sh = cfg.shape;
      cells = enumerateAll(sh).filter(c => !painted.has(K(sh, c.i, c.j)))
        .map(c => ({ key: K(sh, c.i, c.j), ci: c.i, cj: c.j, cx: c.cx, cy: c.cy }));
      drawFn = c => drawTile(sh, c.ci, c.cj);
    }
    if (!cells.length) return;
    snapshot();
    const apply = c => { painted.add(c.key); drawFn(c); };
    if (!cfg.animate) { cells.forEach(apply); dirty = true; return; }
    cells.forEach(c => { c.d = (c.cx - cx) * (c.cx - cx) + (c.cy - cy) * (c.cy - cy); });
    cells.sort((a, b) => a.d - b.d);
    let idx = 0;
    const perFrame = Math.max(6, Math.ceil(cells.length / 45));
    animRunning = true;
    (function step() {
      const end = Math.min(cells.length, idx + perFrame);
      for (; idx < end; idx++) apply(cells[idx]);
      if (idx < cells.length) requestAnimationFrame(step);
      else { animRunning = false; dirty = true; }
    })();
  }

  function resetImage() {
    if (!hasImage) return;
    if (painted.size && dirty && !confirm('변환을 모두 지우고 원본으로 되돌릴까요?')) return;
    snapshot();
    ctx.drawImage(src, 0, 0);
    painted.clear();
    dirty = false;
  }

  // ── 좌표 변환 ─────────────────────────────────────────────
  function getPos(e) {
    const rc = canvas.getBoundingClientRect();
    const sx = W / rc.width, sy = H / rc.height;
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - rc.left) * sx, y: (t.clientY - rc.top) * sy };
  }

  function pointerDown(e) {
    if (!hasImage || comparing) return;
    snapshot();
    const p = getPos(e);
    isDrawing = true;
    paintAt(p.x, p.y);
  }
  function pointerMove(e) {
    if (!isDrawing) return;
    const p = getPos(e);
    paintAt(p.x, p.y);
  }
  function pointerUp() { isDrawing = false; }

  const TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  let lastCX = window.innerWidth / 2, lastCY = window.innerHeight / 2;
  let hideTimer = null;
  function showCursor(clientX, clientY, autoHide) {
    if (comparing) return;
    lastCX = clientX; lastCY = clientY;
    const rc = canvas.getBoundingClientRect();
    const scale = rc.width / W;
    const d = cfg.brushR * 2 * scale;
    cursor.style.width = d + 'px';
    cursor.style.height = d + 'px';
    cursor.style.left = clientX + 'px';
    cursor.style.top = clientY + 'px';
    cursor.classList.toggle('erase', cfg.erase);
    cursor.style.display = hasImage ? 'block' : 'none';
    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    if (autoHide) hideTimer = setTimeout(hideCursor, 900);
  }
  function hideCursor() {
    cursor.style.display = 'none';
    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
  }

  canvas.addEventListener('mousedown', e => { if (TOUCH) return; pointerDown(e); });
  window.addEventListener('mousemove', e => {
    if (TOUCH) return;
    showCursor(e.clientX, e.clientY);
    pointerMove(e);
  });
  window.addEventListener('mouseup', () => { if (!TOUCH) pointerUp(); });
  canvas.addEventListener('mouseleave', () => { if (!TOUCH) hideCursor(); });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; showCursor(t.clientX, t.clientY); pointerDown(e); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; showCursor(t.clientX, t.clientY); pointerMove(e); }, { passive: false });
  canvas.addEventListener('touchend', e => { e.preventDefault(); pointerUp(); hideCursor(); }, { passive: false });

  // ── 비교 슬라이더 ─────────────────────────────────────────
  let comparing = false, comparePct = 50;
  function setCompare(on) {
    if (on && !hasImage) return;
    comparing = on;
    cmp.style.display = on ? 'block' : 'none';
    $('compareBar').style.display = on ? 'block' : 'none';
    $('compareHit').style.display = on ? 'block' : 'none';
    $('cmpLabelL').style.display = on ? 'block' : 'none';
    $('cmpLabelR').style.display = on ? 'block' : 'none';
    $('btnCompare').classList.toggle('on', on);
    if (on) {
      cmp.width = W; cmp.height = H;
      cmpctx.drawImage(src, 0, 0);
      hideCursor();
      updateCompare(comparePct);
    }
  }
  function updateCompare(pct) {
    pct = Math.max(2, Math.min(98, pct));
    comparePct = pct;
    cmp.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
    cmp.style.webkitClipPath = `inset(0 ${100 - pct}% 0 0)`;
    $('compareBar').style.left = pct + '%';
  }
  function compareDrag(clientX) {
    const rc = canvas.getBoundingClientRect();
    updateCompare((clientX - rc.left) / rc.width * 100);
  }
  let cmpDragging = false;
  const hit = $('compareHit');
  hit.addEventListener('mousedown', e => { cmpDragging = true; compareDrag(e.clientX); });
  window.addEventListener('mousemove', e => { if (cmpDragging) compareDrag(e.clientX); });
  window.addEventListener('mouseup', () => { cmpDragging = false; });
  hit.addEventListener('touchstart', e => { e.preventDefault(); compareDrag(e.touches[0].clientX); }, { passive: false });
  hit.addEventListener('touchmove', e => { e.preventDefault(); compareDrag(e.touches[0].clientX); }, { passive: false });

  // ── 캔버스 크기 / 안내 화면 ──────────────────────────────
  function setCanvasSize() {
    canvas.width = W; canvas.height = H;
    src.width = W; src.height = H;
  }
  function drawPlaceholder() {
    W = 1280; H = 800;
    setCanvasSize();
    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, '#3a3a46'); g.addColorStop(1, '#22222b');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '600 40px "Malgun Gothic", sans-serif';
    ctx.fillText('🔺 삼각형 모자익', W / 2, H / 2 - 30);
    ctx.font = '22px "Malgun Gothic", sans-serif';
    ctx.fillText('카메라로 찍거나 [이미지 열기]로 사진을 불러오세요', W / 2, H / 2 + 30);
    hasImage = false;
    fit();
  }

  function loadFromImage(imgOrCanvas, iw, ih, mirror) {
    setCompare(false);
    const s = Math.min(1, MAX_DIM / Math.max(iw, ih));
    W = Math.max(1, Math.round(iw * s));
    H = Math.max(1, Math.round(ih * s));
    setCanvasSize();
    sctx.save();
    sctx.clearRect(0, 0, W, H);
    if (mirror) { sctx.translate(W, 0); sctx.scale(-1, 1); }
    sctx.drawImage(imgOrCanvas, 0, 0, W, H);
    sctx.restore();
    srcData = sctx.getImageData(0, 0, W, H).data;
    ctx.drawImage(src, 0, 0);
    painted.clear();
    resetHistory();
    hasImage = true;
    dirty = false;
    triList = []; triBuckets = null; gradMap = null;
    if (cfg.adaptive) buildLowPoly();
    fit();
  }

  // ── 이미지 열기 ───────────────────────────────────────────
  const fileInput = document.getElementById('fileInput');
  function openImage() { fileInput.click(); }
  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    if (!f) return;
    const img = new Image();
    img.onload = () => { loadFromImage(img, img.width, img.height, false); URL.revokeObjectURL(img.src); };
    img.src = URL.createObjectURL(f);
    fileInput.value = '';
  });

  // ── 카메라 ────────────────────────────────────────────────
  const video = $('video');
  let stream = null, facing = 'user';
  async function startCamera() {
    $('ovCam').classList.add('active');
    $('camError').style.display = 'none';
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: facing },
        audio: false
      });
      video.srcObject = stream;
      video.setAttribute('playsinline', '');
      video.muted = true;
      video.style.transform = (facing === 'user') ? 'scaleX(-1)' : 'none';
      try { await video.play(); } catch (e) {}
      if (!video.videoWidth) {
        await new Promise(res => {
          const done = () => { video.removeEventListener('loadedmetadata', done); res(); };
          video.addEventListener('loadedmetadata', done);
          setTimeout(done, 3000);
        });
      }
    } catch (err) {
      const e = $('camError');
      e.style.display = 'block';
      e.textContent = '카메라를 사용할 수 없습니다: ' + err.message + ' (브라우저 카메라 권한, https/localhost 여부를 확인하세요)';
    }
  }
  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
  }
  function closeCamera() { stopCamera(); $('ovCam').classList.remove('active'); }
  async function flipCamera() {
    const prev = facing;
    facing = (facing === 'user') ? 'environment' : 'user';
    stopCamera();
    await startCamera();
    if (!stream) { facing = prev; await startCamera(); }
  }
  function shoot() {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw) return;
    loadFromImage(video, vw, vh, facing === 'user');
    closeCamera();
  }

  // ── 저장 ──────────────────────────────────────────────────
  function timeStamp() {
    const t = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${t.getFullYear()}${pad(t.getMonth() + 1)}${pad(t.getDate())}_${pad(t.getHours())}${pad(t.getMinutes())}${pad(t.getSeconds())}`;
  }
  function saveImage() {
    if (!hasImage) { openImage(); return; }
    const a = document.createElement('a');
    a.download = `삼각형모자익_${timeStamp()}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
    dirty = false;
  }

  // ── 보내기(업로드 → QR) ───────────────────────────────────
  const UPLOAD_TIMEOUT_MS = 15000;
  let lastShareUrl = null;
  function xhrUpload(url, fd) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', url);
      xhr.timeout = UPLOAD_TIMEOUT_MS;
      xhr.onload = () => (xhr.status >= 200 && xhr.status < 300) ? resolve(xhr.responseText) : reject(new Error('HTTP ' + xhr.status));
      xhr.onerror = () => reject(new Error('네트워크 오류'));
      xhr.ontimeout = () => reject(new Error('시간 초과'));
      xhr.send(fd);
    });
  }
  async function uploadLitterbox(blob, filename) {
    const fd = new FormData();
    fd.append('reqtype', 'fileupload');
    fd.append('time', '72h');
    fd.append('fileToUpload', blob, filename);
    const url = (await xhrUpload('https://litterbox.catbox.moe/resources/internals/api.php', fd)).trim();
    if (!/^https?:\/\/\S+$/.test(url)) throw new Error(url || '업로드 실패');
    return { url, expiry: '72시간' };
  }
  async function uploadTmpfiles(blob, filename) {
    const fd = new FormData();
    fd.append('file', blob, filename);
    const json = JSON.parse(await xhrUpload('https://tmpfiles.org/api/v1/upload', fd));
    if (json.status !== 'success') throw new Error(json.message || '업로드 실패');
    return { url: json.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/'), expiry: '60분' };
  }
  async function uploadForShare(blob, filename) {
    const errors = [];
    try { return await uploadLitterbox(blob, filename); } catch (e) { errors.push('litterbox: ' + e.message); }
    try { return await uploadTmpfiles(blob, filename); } catch (e) { errors.push('tmpfiles: ' + e.message); }
    throw new Error(errors.join(' / ') || '업로드 실패');
  }
  async function send() {
    if (!hasImage) { alert('먼저 사진을 불러오세요.'); return; }
    $('ovSend').classList.add('active');
    $('spinner').style.display = 'block';
    $('qrBox').style.display = 'none';
    $('btnRetry').style.display = 'none';
    $('shareRow').style.display = 'none';
    $('sendMsg').innerHTML = '업로드 중...';
    $('urlText').textContent = '';
    try {
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9));
      const { url, expiry } = await uploadForShare(blob, `triangle_${timeStamp()}.jpg`);
      const qr = qrcode(0, 'M'); qr.addData(url); qr.make();
      $('qrImg').src = qr.createDataURL(8, 8);
      $('spinner').style.display = 'none';
      $('qrBox').style.display = 'block';
      $('sendMsg').innerHTML = '📱 QR을 스캔하거나 아래 버튼으로 열기/공유<br><small>링크는 ' + expiry + ' 동안 유효합니다</small>';
      lastShareUrl = url;
      $('btnOpenPhoto').href = url;
      $('shareRow').style.display = 'flex';
      $('btnShare').style.display = (navigator.share ? '' : 'none');
      $('urlText').textContent = url;
    } catch (err) {
      $('spinner').style.display = 'none';
      $('btnRetry').style.display = '';
      $('sendMsg').innerHTML = '⚠ 업로드에 실패했습니다<br><small>' + err.message + '<br>인터넷 연결을 확인하고 다시 시도하거나 [저장]을 이용하세요</small>';
    }
  }

  function closeApp() {
    if (dirty && !confirm('저장하지 않은 변환이 있습니다. 닫을까요?')) return;
    stopCamera();
    location.href = 'index.html';
  }

  // ── 설정 바인딩 ───────────────────────────────────────────
  $('brushR').addEventListener('input', e => {
    cfg.brushR = +e.target.value;
    $('brushRVal').textContent = e.target.value;
    showCursor(lastCX, lastCY, true);
  });
  $('cellS').addEventListener('input', e => { cfg.cellS = +e.target.value; $('cellSVal').textContent = e.target.value; });
  $('cellS').addEventListener('change', () => { if (cfg.adaptive) rebuildLowPoly(); });
  $('jitter').addEventListener('input', e => { cfg.jitter = +e.target.value; $('jitterVal').textContent = e.target.value; });
  $('detail').addEventListener('input', e => { cfg.detailSens = +e.target.value; $('detailVal').textContent = e.target.value; });
  $('detail').addEventListener('change', () => { if (cfg.adaptive) rebuildLowPoly(); });

  // 적응형(로우폴리) 토글
  function rebuildLowPoly() {
    if (hasImage && painted.size) { ctx.drawImage(src, 0, 0); painted.clear(); dirty = false; }
    resetHistory();                 // 삼각형 인덱스가 바뀌므로 이전 기록은 무효
    triList = []; triBuckets = null;
    buildLowPoly();
  }
  function setAdaptive(on) {
    if (on === cfg.adaptive) return;
    // 두 모드는 변환 키 체계가 달라 전환 시 현재 변환을 초기화
    if (hasImage && painted.size) {
      const msg = on ? '적응형으로 바꾸면 현재 변환이 초기화됩니다. 계속할까요?'
                     : '일반 모드로 바꾸면 현재 변환이 초기화됩니다. 계속할까요?';
      if (!confirm(msg)) return;
      ctx.drawImage(src, 0, 0); painted.clear(); dirty = false;
    }
    resetHistory();                 // 모드 전환 시 변환 키 체계가 달라 기록 무효
    cfg.adaptive = on;
    $('btnAdaptive').classList.toggle('on', on);
    $('cellLabelText').textContent = on ? '삼각형 기본 크기' : '모자익 크기';
    $('detailWrap').style.display = on ? 'flex' : 'none';
    $('jitterWrap').style.display = on ? 'none' : 'flex';
    $('shapeSeg').classList.toggle('disabled', on);
    $('hint').textContent = on
      ? '‘전체 변환’ 또는 드래그 — 단조로운 곳은 큰 삼각형, 디테일한 곳은 작은 삼각형'
      : SHAPE_HINT[cfg.shape];
    if (on) { triList = []; ensureLowPoly(); }
  }
  $('btnAdaptive').addEventListener('click', () => setAdaptive(!cfg.adaptive));

  const SHAPE_HINT = {
    t: '사진을 클릭하거나 드래그하면 삼각형으로 변환돼요',
    s: '사진을 클릭하거나 드래그하면 사각형(픽셀)으로 변환돼요',
    h: '사진을 클릭하거나 드래그하면 육각형으로 변환돼요',
    d: '사진을 클릭하거나 드래그하면 점(원)으로 변환돼요',
  };
  $('shapeSeg').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      $('shapeSeg').querySelectorAll('button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      cfg.shape = b.dataset.shape;
      if (!cfg.erase) $('hint').textContent = SHAPE_HINT[cfg.shape];
    });
  });
  $('styleSeg').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      $('styleSeg').querySelectorAll('button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      cfg.style = b.dataset.style;
      reRenderAll();
      if (painted.size) dirty = true;
      if (comparing) { cmpctx.drawImage(src, 0, 0); }
    });
  });
  $('btnAnim').addEventListener('click', () => {
    cfg.animate = !cfg.animate;
    $('btnAnim').classList.toggle('on', cfg.animate);
  });

  // 버튼 연결
  $('btnCam').addEventListener('click', startCamera);
  $('btnOpen').addEventListener('click', openImage);
  $('btnSave').addEventListener('click', saveImage);
  $('btnSend').addEventListener('click', send);
  $('btnAll').addEventListener('click', paintAll);
  $('btnCompare').addEventListener('click', () => setCompare(!comparing));
  $('btnReset').addEventListener('click', resetImage);
  $('btnErase').addEventListener('click', () => {
    cfg.erase = !cfg.erase;
    $('btnErase').classList.toggle('on', cfg.erase);
    $('hint').textContent = cfg.erase ? '문지른 부분이 원본 사진으로 되돌아갑니다' : SHAPE_HINT[cfg.shape];
  });
  $('btnUndo').addEventListener('click', undo);
  $('btnRedo').addEventListener('click', redo);
  $('btnClose').addEventListener('click', closeApp);

  $('btnShoot').addEventListener('click', shoot);
  $('btnFlip').addEventListener('click', flipCamera);
  $('btnCamCancel').addEventListener('click', closeCamera);

  $('btnRetry').addEventListener('click', send);
  $('btnSendClose').addEventListener('click', () => $('ovSend').classList.remove('active'));
  $('btnCopyLink').addEventListener('click', async () => {
    if (!lastShareUrl) return;
    let ok = false;
    try { await navigator.clipboard.writeText(lastShareUrl); ok = true; }
    catch (e) {
      try {
        const ta = document.createElement('textarea');
        ta.value = lastShareUrl; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        ok = document.execCommand('copy');
        document.body.removeChild(ta);
      } catch (e2) {}
    }
    const b = $('btnCopyLink'), prev = b.textContent;
    b.textContent = ok ? '✓ 복사됨' : '✗ 복사 실패';
    setTimeout(() => { b.textContent = prev; }, 1500);
  });
  $('btnShare').addEventListener('click', async () => {
    if (!lastShareUrl || !navigator.share) return;
    try { await navigator.share({ title: '삼각형 모자익', url: lastShareUrl }); } catch (e) {}
  });

  // 전체화면
  const docEl = document.documentElement;
  const fsRequest = docEl.requestFullscreen || docEl.webkitRequestFullscreen;
  const fsExit = document.exitFullscreen || document.webkitExitFullscreen;
  const fsElement = () => document.fullscreenElement || document.webkitFullscreenElement;
  $('btnFull').addEventListener('click', () => {
    if (!fsRequest) { toolbar.classList.toggle('hidden'); fit(); return; }
    if (fsElement()) fsExit.call(document);
    else fsRequest.call(docEl);
  });

  // 옵션 패널
  function positionPanel() {
    optionsPanel.style.top = (toolbar.classList.contains('hidden') ? 0 : toolbar.offsetHeight) + 'px';
  }
  function toggleOptions(force) {
    const open = (force !== undefined) ? force : optionsPanel.classList.contains('closed');
    optionsPanel.classList.toggle('closed', !open);
    $('btnOptions').classList.toggle('on', open);
    if (open) positionPanel();
  }
  $('btnOptions').addEventListener('click', () => toggleOptions());
  $('btnHide').addEventListener('click', () => { toolbar.classList.add('hidden'); toggleOptions(false); });
  $('showTab').addEventListener('click', () => toolbar.classList.remove('hidden'));

  window.addEventListener('keydown', e => {
    if (!e.ctrlKey) return;
    const k = e.key.toLowerCase();
    if (k === 'z') { e.preventDefault(); undo(); }
    else if (k === 'y') { e.preventDefault(); redo(); }
    else if (k === 's') { e.preventDefault(); saveImage(); }
    else if (k === 'o') { e.preventDefault(); openImage(); }
  });

  // ── 화면 맞춤 ─────────────────────────────────────────────
  function fit() {
    const vv = window.visualViewport;
    const tbH = toolbar.classList.contains('hidden') ? 0 : toolbar.offsetHeight;
    const availW = vv ? vv.width : window.innerWidth;
    const availH = (vv ? vv.height : window.innerHeight) - tbH;
    const s = Math.min(availW / W, availH / H);
    canvas.style.width = (W * s) + 'px';
    canvas.style.height = (H * s) + 'px';
    document.getElementById('stage').style.top = tbH + 'px';
    if (!optionsPanel.classList.contains('closed')) positionPanel();
  }
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', () => setTimeout(fit, 250));
  if (window.visualViewport) window.visualViewport.addEventListener('resize', fit);
  new ResizeObserver(fit).observe(toolbar);

  drawPlaceholder();
  updateHistoryButtons();

})();
</script>
</body>
</html>
